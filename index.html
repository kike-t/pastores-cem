<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pastores CEM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  const cfg={apiKey:"AIzaSyACo7a3uVsGwAdii3d8W3NmXvLVBdgTF1A",authDomain:"pastores-cem.firebaseapp.com",projectId:"pastores-cem",storageBucket:"pastores-cem.firebasestorage.app",messagingSenderId:"45247752354",appId:"1:45247752354:web:eb41da403d38c72d788ffb"};
  const app=initializeApp(cfg);const db=getFirestore(app);
  window.db=db;window.fsDoc=doc;window.fsSetDoc=setDoc;window.fsCollection=collection;window.fsGetDocs=getDocs;
  async function load(){try{const snap=await getDocs(collection(db,"pastores"));if(!snap.empty){const d=[];snap.forEach(x=>d.push(x.data()));d.sort((a,b)=>a.nombre.localeCompare(b.nombre));pastores.length=0;d.forEach(p=>pastores.push(p));renderBoard();}else{await saveCloud();}}catch(e){console.warn(e);}}
  async function saveCloud(){for(const p of pastores){const id=(p.nombre+'_'+(p.apellido||'')).replace(/\s+/g,'_').toLowerCase();try{await setDoc(doc(db,"pastores",id),p);}catch(e){}}}
  window.saveCloud=saveCloud;
  window.addEventListener('load',()=>setTimeout(load,300));
</script>

<style>
:root {
  --canvas: #F0EDE8;
  --white: #FEFEFE;
  --ink: #1A1614;
  --ink2: #6B6560;
  --ink3: #B8B2AC;
  --line: #E2DDD8;

  /* Zone colors — warm, distinct, mural-like */
  --qro-bg: #FFF8E7;
  --qro-border: #E8C84A;
  --qro-label: #8B7A1A;
  --norte-bg: #EAF4FF;
  --norte-border: #5BA4E8;
  --norte-label: #1A5A8B;
  --sur-bg: #F0FFF4;
  --sur-border: #4EC87A;
  --sur-label: #1A6B3A;
  --centro-bg: #FFF0F8;
  --centro-border: #E85AB0;
  --centro-label: #8B1A5A;
  --intl-bg: #F5F0FF;
  --intl-border: #9B72E8;
  --intl-label: #4A1A8B;

  /* Card accent colors */
  --c0: #FF6B6B; --c1: #4ECDC4; --c2: #45B7D1; --c3: #96CEB4;
  --c4: #FFEAA7; --c5: #DDA0DD; --c6: #F0A500; --c7: #87CEEB;
  --c8: #FFB347; --c9: #98D8C8;

  --r: 16px;
  --r-sm: 10px;
  --shadow-card: 0 2px 0 rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.08);
  --shadow-card-hover: 0 6px 0 rgba(0,0,0,0.10), 0 12px 32px rgba(0,0,0,0.14);
  --shadow-panel: 0 32px 80px rgba(0,0,0,0.22), 0 8px 24px rgba(0,0,0,0.10);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;}

/* ── CANVAS ── */
body {
  background: var(--canvas);
  background-image:
    radial-gradient(circle, #C8C0B8 1px, transparent 1px);
  background-size: 24px 24px;
}

/* ── TOOLBAR ── */
.toolbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: calc(env(safe-area-inset-top,0px) + 12px) 20px 12px;
  background: rgba(254,254,254,0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1.5px solid var(--line);
}

.toolbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.brand-mark {
  width: 36px; height: 36px;
  background: var(--ink);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  color: white;
}
.brand-name {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--ink);
  letter-spacing: -0.3px;
  line-height: 1;
}
.brand-sub {
  font-size: 11px;
  color: var(--ink3);
  font-weight: 500;
  margin-top: 1px;
}

.toolbar-divider {
  width: 1px;
  height: 28px;
  background: var(--line);
  flex-shrink: 0;
}

/* Search */
.search-wrap {
  flex: 1;
  max-width: 280px;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  color: var(--ink3);
  pointer-events: none;
}
.search-inp {
  width: 100%;
  padding: 8px 12px 8px 34px;
  background: var(--canvas);
  border: 1.5px solid var(--line);
  border-radius: 99px;
  font-size: 13.5px;
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.search-inp:focus {
  border-color: var(--ink);
  background: var(--white);
}
.search-inp::placeholder { color: var(--ink3); }

/* Zone filters */
.zone-pills {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.zone-pills::-webkit-scrollbar { display: none; }
.zpill {
  padding: 6px 14px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  background: transparent;
  color: var(--ink2);
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
}
.zpill:hover { background: var(--white); border-color: var(--line); }
.zpill.active { background: var(--ink); color: white; border-color: var(--ink); }

.toolbar-count {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink3);
  flex-shrink: 0;
  background: var(--canvas);
  padding: 5px 12px;
  border-radius: 99px;
  border: 1.5px solid var(--line);
}

.tb-btn {
  padding: 8px 16px;
  border-radius: 99px;
  border: 1.5px solid var(--line);
  background: var(--white);
  font-size: 13px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  color: var(--ink2);
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.tb-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
.tb-btn-add { background: #1A1614; color: white; border-color: #1A1614; }
.tb-btn-save { background: #2E8B57; color: white; border-color: #2E8B57; }
.tb-btn-exit { background: #C0392B; color: white; border-color: #C0392B; }

/* ── BOARD ── */
.board-wrap {
  position: fixed;
  inset: 0;
  top: 65px;
  overflow: auto;
  cursor: default;
}

.board {
  padding: 40px 24px 80px;
  min-width: 100%;
}

/* ── ZONE CLUSTER ── */
.zone-cluster {
  margin-bottom: 48px;
}

.zone-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding: 0 4px;
}

.zone-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.zone-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  letter-spacing: -0.3px;
  line-height: 1;
}

.zone-count-pill {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1.5px solid;
}

.zone-line {
  flex: 1;
  height: 1.5px;
  border-radius: 99px;
  opacity: 0.3;
}

/* Zone theming */
.zone-qro .zone-dot { background: var(--qro-border); }
.zone-qro .zone-title { color: var(--qro-label); }
.zone-qro .zone-count-pill { background: var(--qro-bg); color: var(--qro-label); border-color: var(--qro-border); }
.zone-qro .zone-line { background: var(--qro-border); }

.zone-norte .zone-dot { background: var(--norte-border); }
.zone-norte .zone-title { color: var(--norte-label); }
.zone-norte .zone-count-pill { background: var(--norte-bg); color: var(--norte-label); border-color: var(--norte-border); }
.zone-norte .zone-line { background: var(--norte-border); }

.zone-sur .zone-dot { background: var(--sur-border); }
.zone-sur .zone-title { color: var(--sur-label); }
.zone-sur .zone-count-pill { background: var(--sur-bg); color: var(--sur-label); border-color: var(--sur-border); }
.zone-sur .zone-line { background: var(--sur-border); }

.zone-centro .zone-dot { background: var(--centro-border); }
.zone-centro .zone-title { color: var(--centro-label); }
.zone-centro .zone-count-pill { background: var(--centro-bg); color: var(--centro-label); border-color: var(--centro-border); }
.zone-centro .zone-line { background: var(--centro-border); }

.zone-otro .zone-dot { background: var(--intl-border); }
.zone-otro .zone-title { color: var(--intl-label); }
.zone-otro .zone-count-pill { background: var(--intl-bg); color: var(--intl-label); border-color: var(--intl-border); }
.zone-otro .zone-line { background: var(--intl-border); }

/* ── CARDS GRID ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

@media(min-width: 768px) {
  .cards-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
}
@media(min-width: 1200px) {
  .cards-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
}

/* ── PASTOR CARD ── */
.pcard {
  background: var(--white);
  border-radius: var(--r);
  box-shadow: var(--shadow-card);
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.2s ease;
  overflow: hidden;
  position: relative;
  animation: cardIn 0.4s ease backwards;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.pcard:hover {
  transform: translateY(-4px) rotate(0.3deg);
  box-shadow: var(--shadow-card-hover);
}
.pcard:active {
  transform: translateY(-1px) scale(0.99);
}

/* Color stripe at top */
.pcard-stripe {
  height: 5px;
  width: 100%;
}

.pcard-body {
  padding: 16px 16px 14px;
}

/* Avatar row */
.pcard-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}

.pcard-av {
  width: 50px; height: 50px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700;
  color: white;
  flex-shrink: 0;
  overflow: hidden;
  font-family: 'DM Serif Display', serif;
}
.pcard-av img { width: 100%; height: 100%; object-fit: cover; }

.pcard-meta { flex: 1; min-width: 0; }
.pcard-name {
  font-family: 'DM Serif Display', serif;
  font-size: 17px;
  color: var(--ink);
  letter-spacing: -0.2px;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pcard-church {
  font-size: 12px;
  color: var(--ink2);
  margin-top: 2px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pcard-city {
  font-size: 11px;
  color: var(--ink3);
  margin-top: 2px;
  font-weight: 500;
}

/* Tags row */
.pcard-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
}

.ptag {
  font-size: 10.5px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 99px;
  line-height: 1.3;
}
.ptag-spouse { background: #FFF0F5; color: #C04080; }
.ptag-kids { background: #F0F8FF; color: #2060B0; }
.ptag-report { background: #EAFFF4; color: #187040; }
.ptag-pend { background: #FFF8E0; color: #9B7010; }
.ptag-health { background: #FFF0F0; color: #C02020; }

/* Stats mini — shown on cards with reporte */
.pcard-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
}
.pm-box {
  text-align: center;
  padding: 5px 2px;
  border-radius: 7px;
  background: var(--canvas);
}
.pm-num {
  font-size: 15px;
  font-weight: 700;
  line-height: 1;
}
.pm-lbl {
  font-size: 9px;
  color: var(--ink3);
  font-weight: 600;
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Edit mode highlight */
.pcard.edit-mode {
  outline: 2.5px dashed #E85AB0;
  outline-offset: 3px;
}
.pcard.edit-mode:hover {
  outline-color: var(--ink);
}

/* ── DETAIL PANEL ── */
.panel-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(20,15,10,0.5);
  z-index: 300;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  align-items: center;
  justify-content: flex-end;
  padding: 0;
}
.panel-bg.open { display: flex; }

@media(min-width: 640px) {
  .panel-bg { padding: 20px; justify-content: flex-end; }
  .panel { border-radius: var(--r) !important; max-height: calc(100vh - 40px) !important; }
}

.panel {
  background: var(--white);
  width: 100%;
  max-width: 480px;
  height: 100%;
  max-height: 100vh;
  overflow-y: auto;
  scrollbar-width: none;
  animation: slideIn 0.3s cubic-bezier(0.34,1.1,0.64,1);
  box-shadow: var(--shadow-panel);
}
.panel::-webkit-scrollbar { display: none; }

@keyframes slideIn {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

/* Panel header — colored */
.panel-header {
  position: relative;
  padding: 28px 24px 24px;
  overflow: hidden;
}
.panel-header-bg {
  position: absolute;
  inset: 0;
  opacity: 0.12;
}
.panel-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 30px; height: 30px;
  border-radius: 99px;
  background: rgba(0,0,0,0.08);
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 13px;
  color: var(--ink2);
  transition: all 0.15s;
}
.panel-close:hover { background: var(--ink); color: white; }

.panel-av-lg {
  width: 72px; height: 72px;
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 700;
  color: white;
  overflow: hidden;
  box-shadow: 0 6px 24px rgba(0,0,0,0.2);
  margin-bottom: 14px;
  font-family: 'DM Serif Display', serif;
}
.panel-av-lg img { width: 100%; height: 100%; object-fit: cover; }

.panel-name {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--ink);
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.panel-church {
  font-size: 14px;
  color: var(--ink2);
  margin-top: 5px;
  font-weight: 500;
}
.panel-chips {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}

/* Panel actions */
.panel-actions {
  display: flex;
  gap: 8px;
  padding: 14px 20px;
  border-bottom: 1.5px solid var(--line);
  overflow-x: auto;
  scrollbar-width: none;
}
.panel-actions::-webkit-scrollbar { display: none; }

.pact {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
  cursor: pointer;
}
.pact-ico {
  width: 46px; height: 46px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: transform 0.15s;
}
.pact:active .pact-ico { transform: scale(0.9); }
.pact-lbl { font-size: 10px; font-weight: 600; color: var(--ink2); }

/* Panel sections */
.ps { padding: 18px 20px 0; }
.ps-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink3);
  margin-bottom: 8px;
}

.ps-block {
  background: var(--canvas);
  border-radius: var(--r-sm);
  overflow: hidden;
  margin-bottom: 16px;
  border: 1px solid var(--line);
}
.ps-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
}
.ps-row:last-child { border-bottom: none; }
.ps-ico { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.ps-key { font-size: 13px; font-weight: 600; color: var(--ink); flex: 1; }
.ps-val { font-size: 12.5px; color: var(--ink2); text-align: right; font-weight: 500; max-width: 180px; line-height: 1.4; }

.ps-text {
  background: var(--canvas);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 13px 14px;
  font-size: 13.5px;
  line-height: 1.75;
  color: var(--ink2);
  margin-bottom: 16px;
  font-weight: 400;
}

/* Hijos */
.hijos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
  margin-bottom: 16px;
}
.hijo-tile {
  background: var(--canvas);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 12px;
  text-align: center;
}
.hijo-av-sm {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, #667EEA, #764BA2);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: white;
  margin: 0 auto 8px;
  font-family: 'DM Serif Display', serif;
}
.hijo-tile-name { font-size: 13px; font-weight: 700; color: var(--ink); }
.hijo-tile-age {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 99px;
  background: #EBF2FF; color: #1560D4;
  margin-top: 4px;
}
.hijo-tile-detail { font-size: 11px; color: var(--ink3); margin-top: 4px; line-height: 1.3; }

/* Métricas */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 7px;
  margin-bottom: 16px;
}
.metric-tile {
  background: var(--canvas);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 11px 8px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.metric-tile::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 0;
}
.metric-tile.m-green::after { background: #0A8F5C; }
.metric-tile.m-gold::after { background: #D4900A; }
.metric-tile.m-red::after { background: #D63939; }
.metric-num { font-size: 22px; font-weight: 700; line-height: 1; font-family: 'DM Serif Display', serif; }
.metric-lbl { font-size: 9.5px; color: var(--ink3); font-weight: 600; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
.metric-tile-avg {
  background: var(--ink);
  border-color: var(--ink);
}
.metric-tile-avg .metric-num { color: white; }
.metric-tile-avg .metric-lbl { color: rgba(255,255,255,0.5); }

/* Oración tags */
.prayer-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 16px;
}
.prayer-tag {
  font-size: 12.5px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 99px;
  background: var(--canvas);
  border: 1.5px solid var(--line);
  color: var(--ink2);
  line-height: 1.3;
}

/* Pendientes */
.pend-list {
  background: var(--canvas);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  overflow: hidden;
  margin-bottom: 16px;
}
.pend-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
}
.pend-item:last-child { border-bottom: none; }
.pend-n {
  min-width: 20px; height: 20px;
  background: #FFF6E0;
  border-radius: 6px;
  font-size: 10px; font-weight: 800;
  color: #9B7010;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.pend-t { font-size: 13px; color: var(--ink); line-height: 1.55; font-weight: 400; }

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 7px;
  margin-bottom: 16px;
}
.stat-tile {
  background: var(--canvas);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 12px 13px;
}
.stat-num { font-size: 21px; font-weight: 700; color: var(--ink); font-family: 'DM Serif Display', serif; letter-spacing: -0.3px; }
.stat-lbl { font-size: 11px; color: var(--ink2); margin-top: 3px; font-weight: 500; line-height: 1.3; }

/* Events */
.events-list {
  background: var(--canvas);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  overflow: hidden;
  margin-bottom: 16px;
}
.event-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
}
.event-row:last-child { border-bottom: none; }
.event-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ink3);
  flex-shrink: 0;
  margin-top: 5px;
}
.event-name { font-size: 12.5px; font-weight: 600; color: var(--ink); }
.event-meta { font-size: 10.5px; color: var(--ink3); font-weight: 600; margin-top: 2px; }
.event-desc { font-size: 11.5px; color: var(--ink2); margin-top: 2px; line-height: 1.4; }

/* ── EDIT FORM ── */
.ef-bg{display:none;position:fixed;inset:0;background:rgba(15,15,15,0.6);z-index:400;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.ef-bg.open{display:flex;}
@media(min-width:640px){.ef-bg.open{align-items:center;padding:20px;}.ef-panel{border-radius:var(--r)!important;max-height:90vh!important;}}
.ef-panel{background:var(--white);width:100%;max-width:500px;max-height:95vh;border-radius:var(--r) var(--r) 0 0;overflow-y:auto;scrollbar-width:none;animation:panelUp 0.3s cubic-bezier(0.34,1.1,0.64,1);box-shadow:var(--shadow-panel);padding-bottom:env(safe-area-inset-bottom,20px);}
.ef-panel::-webkit-scrollbar{display:none;}
@keyframes panelUp{from{transform:translateY(50px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.ef-nav{display:flex;align-items:center;padding:14px 20px;border-bottom:1.5px solid var(--line);}
.ef-nav-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--ink);flex:1;text-align:center;}
.ef-cancel{font-size:13.5px;font-weight:600;background:none;border:none;color:#C02020;cursor:pointer;font-family:'DM Sans',sans-serif;}
.ef-done{font-size:13.5px;font-weight:700;background:none;border:none;color:#1560D4;cursor:pointer;font-family:'DM Sans',sans-serif;}
.ef-body{padding:20px;}
.ef-group{margin-bottom:20px;}
.ef-group-title{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;}
.ef-fields{background:var(--canvas);border:1.5px solid var(--line);border-radius:var(--r-sm);overflow:hidden;}
.ef-field{display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--line);min-height:44px;}
.ef-field:last-child{border-bottom:none;}
.ef-lbl{font-size:13px;font-weight:600;color:var(--ink);min-width:90px;flex-shrink:0;}
.ef-inp,.ef-sel{flex:1;background:none;border:none;outline:none;font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--ink2);text-align:right;padding:11px 0;font-weight:400;}
.ef-ta{width:100%;background:var(--canvas);border:1.5px solid var(--line);border-radius:var(--r-sm);padding:12px 14px;font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;min-height:80px;resize:vertical;line-height:1.6;}
.ef-ta:focus{border-color:var(--ink);}
.ef-row-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line);}
.ef-row-item:last-child{border-bottom:none;}
.ef-row-item input{flex:1;background:none;border:none;outline:none;font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--ink);}
.ef-row-item input::placeholder{color:var(--ink3);}
.ef-del{background:none;border:none;color:#C02020;font-size:20px;cursor:pointer;padding:0 4px;line-height:1;}
.ef-add-btn{display:flex;align-items:center;gap:6px;width:100%;padding:10px 14px;background:var(--canvas);border:1.5px solid var(--line);border-radius:var(--r-sm);font-size:13.5px;font-weight:600;color:#1560D4;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;transition:all 0.15s;}
.ef-add-btn:hover{background:#EBF2FF;border-color:#5BA4E8;}
.ef-pend-item{display:flex;align-items:flex-start;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line);}
.ef-pend-item:last-child{border-bottom:none;}
.ef-pend-ta{flex:1;background:none;border:none;outline:none;font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--ink);resize:none;min-height:36px;line-height:1.5;padding:4px 0;}
.ef-pend-ta::placeholder{color:var(--ink3);}
.ef-submit{width:100%;padding:13px;border-radius:var(--r-sm);border:none;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;transition:all 0.15s;}
.ef-submit-save{background:var(--ink);color:white;}
.ef-submit-delete{background:#FFF0F0;color:#C02020;border:1.5px solid rgba(192,32,32,0.2);}

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink3);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--ink2); }
.empty-sub { font-size: 13px; margin-top: 6px; }
</style>
</head>

const ZONES=[
  {id:'qro',label:'Querétaro',cls:'zone-qro'},
  {id:'norte',label:'Norte',cls:'zone-norte'},
  {id:'sur',label:'Sur',cls:'zone-sur'},
  {id:'centro',label:'Centro',cls:'zone-centro'},

const CARD_COLORS=['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#F0A500','#DDA0DD','#87CEEB','#FF8C69','#7EC8E3','#C3B1E1'];
function cardColor(p){let h=0;for(const c of (p.nombre||''))h=(h*31+c.charCodeAt(0))&0xFFFFFF;return CARD_COLORS[h%CARD_COLORS.length];}

let activeZ='todos', editMode=false;
const SK='pastores_cem_v6';
try{const s=localStorage.getItem(SK);if(s){const d=JSON.parse(s);if(d&&d.length){pastores.length=0;d.forEach(p=>pastores.push(p));}}}catch(e){}

function setZ(btn){
  document.querySelectorAll('.zpill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeZ=btn.dataset.z;
  renderBoard();
}

function renderBoard(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const board=document.getElementById('board');

  const filtered=pastores.filter(p=>{
    const mz=activeZ==='todos'||p.zona===activeZ;
    const hay=[p.nombre,p.apellido||'',p.iglesia||'',p.ciudad||'',p.esposa||''].join(' ').toLowerCase();
    return mz&&(!q||hay.includes(q));
  });

  document.getElementById('top-count').textContent=filtered.length+' pastores';

  const zones=activeZ==='todos'?ZONES:ZONES.filter(z=>z.id===activeZ);
  let html='';

  const seen=new Set();
  zones.forEach(z=>{
    const zp=filtered.filter(p=>p.zona===z.id&&!seen.has(p.nombre+p.apellido));
    if(!zp.length)return;
    zp.forEach(p=>seen.add(p.nombre+p.apellido));

    html+=`<div class="zone-cluster zone-${z.id}">
      <div class="zone-header">
        <div class="zone-dot"></div>
        <div class="zone-title">${z.label}</div>
        <div class="zone-count-pill">${zp.length}</div>
        <div class="zone-line"></div>
      </div>
      <div class="cards-grid">`;

    zp.forEach((p,i)=>{
      const idx=pastores.indexOf(p);
      const full=(p.nombre+' '+(p.apellido||'')).trim();
      const photo=pastorPhotos[p.nombre];
      const col=cardColor(p);
      const hasPend=p.pendientes&&p.pendientes.length;
      const hasHealth=hasPend&&p.pendientes.some(x=>/salud|cirugía|médic/i.test(x));
      const hasRP=!!p.reporte_personal;
      const avHtml=photo
        ?`<div class="pcard-av" style="background:${col}"><img src="${photo}"></div>`
        :`<div class="pcard-av" style="background:${col}">${(p.avatar||(p.nombre[0]+(p.apellido||'')[0]||'')).toUpperCase()}</div>`;

      // Mini metrics
      let metricsHtml='';
      if(p.reporte_personal&&p.reporte_personal.metricas){
        const m=p.reporte_personal.metricas;
        const keys=[['familia','Fam'],['intimidad','Int'],['entusiasmo','Ent']];
        metricsHtml=`<div class="pcard-metrics">`;
        keys.forEach(([k,lbl])=>{
          if(m[k]===undefined)return;
          const v=m[k];
          const col2=v>=9?'#0A8F5C':v>=7?'#D4900A':'#D63939';
          metricsHtml+=`<div class="pm-box"><div class="pm-num" style="color:${col2}">${v}</div><div class="pm-lbl">${lbl}</div></div>`;
        });
        metricsHtml+=`</div>`;
      }

      html+=`<div class="pcard${editMode?' edit-mode':''}" style="animation-delay:${i*0.04}s" onclick="${editMode?`openEF(${idx})`:`openPanel(${idx})`}">
        <div class="pcard-stripe" style="background:${col}"></div>
        <div class="pcard-body">
          <div class="pcard-top">
            ${avHtml}
            <div class="pcard-meta">
              <div class="pcard-name">${full}</div>
              <div class="pcard-church">${p.iglesia||'—'}</div>
              <div class="pcard-city">${p.ciudad||''}</div>
            </div>
          </div>
          <div class="pcard-tags">
            ${p.esposa?`<span class="ptag ptag-spouse">♡ ${p.esposa}</span>`:''}
            ${p.hijos&&p.hijos.length?`<span class="ptag ptag-kids">${p.hijos.length} hijo${p.hijos.length>1?'s':''}</span>`:''}
            ${hasRP?`<span class="ptag ptag-report">📊 ${p.reporte_personal.fecha||'Reporte'}</span>`:''}
            ${hasHealth?`<span class="ptag ptag-health">⚕ salud</span>`:hasPend?`<span class="ptag ptag-pend">${p.pendientes.length} pend.</span>`:''}
          </div>
          ${metricsHtml}
        </div>
      </div>`;
    });

    html+=`</div></div>`;
  });

  if(!html){
    html=`<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">Sin resultados</div>
      <div class="empty-sub">Intenta con otro término o zona</div>
    </div>`;
  }

  board.innerHTML=html;
}

/* ─── PANEL ─── */
function openPanel(idx){
  const p=pastores[idx];
  const d=directorio[p.nombre]||directorio[(p.nombre||'').split(' ')[0]]||{};
  const full=(p.nombre+' '+(p.apellido||'')).trim();
  const photo=pastorPhotos[p.nombre];
  const col=cardColor(p);

  const avHtml=photo
    ?`<div class="panel-av-lg" style="background:${col}"><img src="${photo}"></div>`
    :`<div class="panel-av-lg" style="background:${col}">${(p.avatar||(p.nombre[0]+(p.apellido||'')[0]||'')).toUpperCase()}</div>`;

  let h=`
    <div class="panel-header">
      <div class="panel-header-bg" style="background:${col}"></div>
      <button class="panel-close" onclick="document.getElementById('panel-bg').classList.remove('open')">✕</button>
      ${avHtml}
      <div class="panel-name">${full}</div>
      <div class="panel-church">${p.iglesia||''} · ${p.ciudad||''}</div>
      <div class="panel-chips">
        ${p.esposa?`<span class="ptag ptag-spouse">♡ ${p.esposa}</span>`:''}
        ${p.cumple?`<span class="ptag ptag-kids">🎂 ${p.cumple}</span>`:''}
      </div>
    </div>`;

  // Actions
  const acts=[];
  if(d.tel)acts.push(`<div class="pact" onclick="window.location='tel:${d.tel}'"><div class="pact-ico" style="background:#EAFFF4">📞</div><div class="pact-lbl">Llamar</div></div>`);
  if(d.email)acts.push(`<div class="pact" onclick="window.location='mailto:${d.email}'"><div class="pact-ico" style="background:#EBF2FF">✉️</div><div class="pact-lbl">Email</div></div>`);
  if(d.web)acts.push(`<div class="pact" onclick="window.open('${d.web}','_blank')"><div class="pact-ico" style="background:#FFF8E0">🌐</div><div class="pact-lbl">Web</div></div>`);
  if(d.facebook)acts.push(`<div class="pact" onclick="window.open('${d.facebook}','_blank')"><div class="pact-ico" style="background:#EEF3FF">📘</div><div class="pact-lbl">Facebook</div></div>`);
  if(d.instagram&&d.instagram.startsWith('http'))acts.push(`<div class="pact" onclick="window.open('${d.instagram}','_blank')"><div class="pact-ico" style="background:#FDF0FF">📷</div><div class="pact-lbl">Instagram</div></div>`);
  if(acts.length)h+=`<div class="panel-actions">${acts.join('')}</div>`;

  if(d.horarios)h+=`<div class="ps"><div class="ps-label">Servicios</div><div class="ps-block"><div class="ps-row"><div class="ps-ico">🕐</div><div class="ps-key">Horarios</div><div class="ps-val">${d.horarios}</div></div></div></div>`;

  if(p.esposa||p.cumple){
    h+=`<div class="ps"><div class="ps-label">Personal</div><div class="ps-block">`;
    if(p.esposa)h+=`<div class="ps-row"><div class="ps-ico">💝</div><div class="ps-key">Esposa</div><div class="ps-val">${p.esposa}</div></div>`;
    if(p.cumple)h+=`<div class="ps-row"><div class="ps-ico">🎂</div><div class="ps-key">Cumpleaños</div><div class="ps-val">${p.cumple}</div></div>`;
    h+=`</div></div>`;
  }

  if(p.hijos&&p.hijos.length){
    h+=`<div class="ps"><div class="ps-label">Hijos</div><div class="hijos-grid">`;
    p.hijos.forEach(c=>{
      h+=`<div class="hijo-tile"><div class="hijo-av-sm">${(c.nombre||'?')[0].toUpperCase()}</div><div class="hijo-tile-name">${c.nombre}</div>${c.edad?`<div class="hijo-tile-age">${c.edad}a</div>`:''}</div>`;
    });
    h+=`</div></div>`;
  }

  // Reporte personal
  function renderMetrics(rp, titulo){
    const keys=[['familia','Fam'],['intimidad','Int'],['entusiasmo','Ent'],['liderazgo','Lid'],['economia','Eco'],['salud','Sal']];
    const vals=keys.filter(([k])=>rp.metricas&&rp.metricas[k]!==undefined);
    if(!vals.length)return'';
    const avg=(vals.reduce((s,[k])=>s+rp.metricas[k],0)/vals.length).toFixed(1);
    let out=`<div class="ps"><div class="ps-label">${titulo}</div><div class="metrics-row">`;
    vals.forEach(([k,lbl])=>{
      const v=rp.metricas[k];
      const cls=v>=9?'m-green':v>=7?'m-gold':'m-red';
      const numcol=v>=9?'#0A8F5C':v>=7?'#D4900A':'#D63939';
      out+=`<div class="metric-tile ${cls}"><div class="metric-num" style="color:${numcol}">${v}</div><div class="metric-lbl">${lbl}</div></div>`;
    });
    out+=`<div class="metric-tile metric-tile-avg"><div class="metric-num">${avg}</div><div class="metric-lbl">Prom.</div></div>`;
    out+=`</div>`;
    if(rp.oracion&&rp.oracion.length){
      const items=Array.isArray(rp.oracion)?rp.oracion:rp.oracion.split(/[·\n,]/).map(x=>x.trim()).filter(Boolean);
      out+=`<div class="ps-label" style="margin:0 20px 8px;">Oración</div><div style="padding:0 20px"><div class="prayer-tags">`;
      items.forEach(x=>out+=`<span class="prayer-tag">🙏 ${x}</span>`);
      out+=`</div></div>`;
    }
    out+=`</div>`;
    return out;
  }

  if(p.reporte_personal)h+=renderMetrics(p.reporte_personal,'Reporte '+(p.reporte_personal.fecha||''));
  if(p.reporte_personal_yabeth)h+=renderMetrics(p.reporte_personal_yabeth,'Reporte Yabeth — Abril 2026');

  if(p.reunion)h+=`<div class="ps"><div class="ps-label">Última reunión</div><div class="ps-text">${p.reunion}</div></div>`;
  if(p.notas)h+=`<div class="ps"><div class="ps-label">Notas</div><div class="ps-text">${p.notas}</div></div>`;

  if(p.iglesia_reporte){
    const ir=p.iglesia_reporte;
    h+=`<div class="ps"><div class="ps-label">Iglesia — Reporte 2025</div>`;
    if(ir.stats){h+=`<div class="stats-grid">`;ir.stats.forEach(s=>h+=`<div class="stat-tile"><div class="stat-num">${s.valor}</div><div class="stat-lbl">${s.label}</div></div>`);h+=`</div>`;}
    if(ir.logros)h+=`<div class="ps-text">${ir.logros}</div>`;
    if(ir.plan2026)h+=`<div class="ps-label" style="margin:0 20px 8px;">Plan 2026</div><div style="padding:0 20px"><div class="ps-text">${ir.plan2026}</div></div>`;
    h+=`</div>`;
  }

  if(p.pendientes&&p.pendientes.length){
    h+=`<div class="ps"><div class="ps-label">Pendientes</div><div class="pend-list">`;
    p.pendientes.forEach((x,i)=>h+=`<div class="pend-item"><span class="pend-n">${i+1}</span><span class="pend-t">${x}</span></div>`);
    h+=`</div></div>`;
  }

  h+=`<div style="height:20px"></div>`;
  document.getElementById('panel').innerHTML=h;
  document.getElementById('panel-bg').classList.add('open');
}

function closePanel(e){if(e.target===document.getElementById('panel-bg'))document.getElementById('panel-bg').classList.remove('open');}

/* ─── EDIT MODE ─── */
function toggleEdit(){
  editMode=!editMode;
  const btn=document.getElementById('tb-edit');
  btn.textContent=editMode?'✕ Salir':'✎ Editar';
  btn.className='tb-btn'+(editMode?' tb-btn-exit':'');
  document.getElementById('tb-add').style.display=editMode?'':'none';
  document.getElementById('tb-save').style.display=editMode?'':'none';
  renderBoard();
}

async function saveAll(){
  try{
    localStorage.setItem(SK,JSON.stringify(pastores));
    const btn=document.getElementById('tb-save');
    const orig=btn.textContent;
    btn.textContent='✓ Guardado';
    if(window.saveCloud)await window.saveCloud();
    setTimeout(()=>btn.textContent=orig,2000);
    renderBoard();
  }catch(e){}
}

/* ─── EDIT FORM ─── */
let editIdx=-1;
function openEF(idx){
  editIdx=idx;
  const p=idx===-1?{nombre:'',apellido:'',iglesia:'',ciudad:'',zona:'qro',esposa:'',cumple:'',avatar:'',hijos:[],notas:'',reunion:'',pendientes:[],tags:[]}:JSON.parse(JSON.stringify(pastores[idx]));
  const zO=ZONES.map(z=>`<option value="${z.id}" ${p.zona===z.id?'selected':''}>${z.label}</option>`).join('');
  const hH=(p.hijos||[]).map((c,i)=>`<div class="ef-row-item"><input placeholder="Nombre" value="${c.nombre||''}" oninput="eH(${i},'nombre',this.value)"><input placeholder="Edad" value="${c.edad||''}" style="max-width:55px" oninput="eH(${i},'edad',this.value)"><button class="ef-del" onclick="rH(${i})">−</button></div>`).join('');
  const pH=(p.pendientes||[]).map((x,i)=>`<div class="ef-pend-item"><textarea class="ef-pend-ta" rows="2" oninput="eP(${i},this.value)">${x}</textarea><button class="ef-del" onclick="rP(${i})">−</button></div>`).join('');
  document.getElementById('ef-panel').innerHTML=`
    <div class="ef-nav"><button class="ef-cancel" onclick="closeEF()">Cancelar</button><div class="ef-nav-title">${idx===-1?'Nuevo pastor':'Editar'}</div><button class="ef-done" onclick="saveForm()">Listo</button></div>
    <div class="ef-body">
      <div class="ef-group"><div class="ef-group-title">Información</div>
        <div class="ef-fields">
          <div class="ef-field"><span class="ef-lbl">Nombre</span><input class="ef-inp" value="${p.nombre}" oninput="eT('nombre',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Apellido</span><input class="ef-inp" value="${p.apellido||''}" oninput="eT('apellido',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Iglesia</span><input class="ef-inp" value="${p.iglesia||''}" oninput="eT('iglesia',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Ciudad</span><input class="ef-inp" value="${p.ciudad||''}" oninput="eT('ciudad',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Zona</span><select class="ef-sel" onchange="eT('zona',this.value)">${zO}</select></div>
          <div class="ef-field"><span class="ef-lbl">Esposa</span><input class="ef-inp" value="${p.esposa||''}" oninput="eT('esposa',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Cumpleaños</span><input class="ef-inp" value="${p.cumple||''}" oninput="eT('cumple',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Iniciales</span><input class="ef-inp" value="${p.avatar||''}" maxlength="3" oninput="eT('avatar',this.value)"></div>
        </div>
      </div>
      <div class="ef-group"><div class="ef-group-title">Hijos</div>
        <div class="ef-fields" id="hijos-list">${hH||'<div style="padding:11px 14px;color:#B8B2AC;font-size:13px">Sin hijos</div>'}</div>
        <button class="ef-add-btn" onclick="addH()">+ Agregar hijo</button>
      </div>
      <div class="ef-group"><div class="ef-group-title">Notas</div><textarea class="ef-ta" oninput="eT('notas',this.value)">${p.notas||''}</textarea></div>
      <div class="ef-group"><div class="ef-group-title">Última reunión</div><textarea class="ef-ta" oninput="eT('reunion',this.value)">${p.reunion||''}</textarea></div>
      <div class="ef-group"><div class="ef-group-title">Pendientes</div>
        <div class="ef-fields" id="pend-list">${pH||'<div style="padding:11px 14px;color:#B8B2AC;font-size:13px">Sin pendientes</div>'}</div>
        <button class="ef-add-btn" onclick="addP()">+ Agregar pendiente</button>
      </div>
      <button class="ef-submit ef-submit-save" onclick="saveForm()">Guardar cambios</button>
      ${idx!==-1?`<button class="ef-submit ef-submit-delete" onclick="delP(${idx})">Eliminar pastor</button>`:''}
    </div>`;
  window._et=p;
  document.getElementById('ef-bg').classList.add('open');
}
function eT(f,v){if(window._et)window._et[f]=v;}
function eH(i,f,v){if(window._et&&window._et.hijos)window._et.hijos[i][f]=v;}
function rH(i){if(window._et){window._et.hijos.splice(i,1);openEF(editIdx);}}
function addH(){if(window._et){if(!window._et.hijos)window._et.hijos=[];window._et.hijos.push({nombre:'',edad:'',datos:''});openEF(editIdx);}}
function eP(i,v){if(window._et&&window._et.pendientes)window._et.pendientes[i]=v;}
function rP(i){if(window._et){window._et.pendientes.splice(i,1);openEF(editIdx);}}
function addP(){if(window._et){if(!window._et.pendientes)window._et.pendientes=[];window._et.pendientes.push('');openEF(editIdx);}}
function saveForm(){const p=window._et;if(!p||!p.nombre)return alert('Nombre requerido');if(!p.avatar)p.avatar=(p.nombre[0]+((p.apellido||'')[0]||'')).toUpperCase();if(!p.tags)p.tags=[];p.pendientes=(p.pendientes||[]).filter(x=>x.trim());p.hijos=(p.hijos||[]).filter(h=>h.nombre);if(editIdx===-1)pastores.push(p);else pastores[editIdx]=p;saveAll();closeEF();renderBoard();}
function delP(i){if(!confirm('¿Eliminar a '+pastores[i].nombre+'?'))return;pastores.splice(i,1);saveAll();closeEF();renderBoard();}
function closeEF(e){if(e&&e.target!==document.getElementById('ef-bg'))return;document.getElementById('ef-bg').classList.remove('open');window._et=null;editIdx=-1;}

renderBoard();
</script>
</body>
</html>
