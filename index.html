<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pastores CEM</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  const cfg={apiKey:"AIzaSyACo7a3uVsGwAdii3d8W3NmXvLVBdgTF1A",authDomain:"pastores-cem.firebaseapp.com",projectId:"pastores-cem",storageBucket:"pastores-cem.firebasestorage.app",messagingSenderId:"45247752354",appId:"1:45247752354:web:eb41da403d38c72d788ffb"};
  const app=initializeApp(cfg); const db=getFirestore(app);
  window.db=db;window.fsDoc=doc;window.fsSetDoc=setDoc;window.fsCollection=collection;window.fsGetDocs=getDocs;
  async function load(){try{const snap=await getDocs(collection(db,"pastores"));if(!snap.empty){const d=[];snap.forEach(x=>d.push(x.data()));d.sort((a,b)=>a.nombre.localeCompare(b.nombre));pastores.length=0;d.forEach(p=>pastores.push(p));render();}else{await saveCloud();}}catch(e){console.warn(e);}}
  async function saveCloud(){for(const p of pastores){const id=(p.nombre+'_'+(p.apellido||'')).replace(/\s+/g,'_').toLowerCase();try{await setDoc(doc(db,"pastores",id),p);}catch(e){}}}
  window.saveCloud=saveCloud;
  window.addEventListener('load',()=>setTimeout(load,300));
</script>

<style>
:root {
  --bg: #F7F7F8;
  --white: #FFFFFF;
  --ink: #0F0F0F;
  --ink2: #5C5C5C;
  --ink3: #ADADAD;
  --line: #E8E8EA;
  --accent: #1A1A2E;
  --accent2: #16213E;
  --gold: #D4900A;
  --gold-light: #FFF6E0;
  --green: #0A8F5C;
  --green-light: #E3F5EE;
  --red: #D63939;
  --red-light: #FEF0F0;
  --blue: #1560D4;
  --blue-light: #EBF2FF;
  --purple: #7C3AED;
  --purple-light: #F3EEFF;
  --r: 18px;
  --r-sm: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,0.05), 0 2px 12px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;}

/* ── TOP BAR ── */
.topbar{background:var(--white);border-bottom:1.5px solid var(--line);padding:calc(env(safe-area-inset-top,0px)+14px) 20px 0;position:sticky;top:0;z-index:100;}
.topbar-row{display:flex;align-items:center;gap:12px;padding-bottom:12px;}
.app-icon{width:38px;height:38px;border-radius:11px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.app-icon span{font-size:17px;}
.topbar-titles{flex:1;}
.topbar-title{font-size:19px;font-weight:800;color:var(--ink);letter-spacing:-0.4px;line-height:1.1;}
.topbar-sub{font-size:11.5px;color:var(--ink3);font-weight:500;margin-top:1px;}
.topbar-count{font-size:13px;font-weight:700;background:var(--accent);color:white;padding:4px 11px;border-radius:99px;flex-shrink:0;}
.search-row{display:flex;gap:10px;padding-bottom:10px;}
.search-box{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r-sm);padding:9px 13px;transition:border-color 0.2s;}
.search-box:focus-within{border-color:var(--accent);}
.search-box svg{width:15px;height:15px;color:var(--ink3);flex-shrink:0;}
.search-inp{border:none;background:none;outline:none;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);flex:1;font-weight:500;}
.search-inp::placeholder{color:var(--ink3);}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--line);margin:0 -20px;padding:0 20px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:9px 15px;font-size:12.5px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;border:none;background:none;color:var(--ink3);cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;transition:all 0.15s;margin-bottom:-1px;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── CONTENT ── */
.content{padding:18px 14px 140px;}
.zone-section{margin-bottom:24px;}
.zone-label{font-size:10.5px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:0.14em;padding:0 4px;margin-bottom:9px;}

/* ── CARD ── */
.card{background:var(--white);border:1.5px solid var(--line);border-radius:var(--r);padding:13px 14px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:all 0.18s cubic-bezier(0.34,1.4,0.64,1);box-shadow:var(--shadow);margin-bottom:7px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background 0.2s;border-radius:3px 0 0 3px;}
.card:hover{transform:translateY(-2px) scale(1.004);box-shadow:var(--shadow-lg);border-color:rgba(26,26,46,0.2);}
.card:hover::before{background:var(--accent);}
.card:active{transform:scale(0.99);opacity:0.85;}

/* Avatar */
.av{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;overflow:hidden;transition:transform 0.2s;}
.card:hover .av{transform:scale(1.06);}
.av img{width:100%;height:100%;object-fit:cover;}
.av-0{background:linear-gradient(135deg,#667EEA,#764BA2);}
.av-1{background:linear-gradient(135deg,#F093FB,#F5576C);}
.av-2{background:linear-gradient(135deg,#4FACFE,#00F2FE);}
.av-3{background:linear-gradient(135deg,#43E97B,#38F9D7);}
.av-4{background:linear-gradient(135deg,#FA709A,#FEE140);}
.av-5{background:linear-gradient(135deg,#A18CD1,#FBC2EB);}
.av-6{background:linear-gradient(135deg,#FD746C,#FF9068);}
.av-7{background:linear-gradient(135deg,#30CFD0,#330867);}
.av-8{background:linear-gradient(135deg,#A1C4FD,#C2E9FB);}
.av-9{background:linear-gradient(135deg,#FFF1EB,#ACE0F9);}

.card-body{flex:1;min-width:0;}
.card-name{font-size:14.5px;font-weight:700;color:var(--ink);letter-spacing:-0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-church{font-size:12.5px;color:var(--ink2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.card-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.chip{font-size:10.5px;font-weight:700;padding:2.5px 8px;border-radius:99px;line-height:1.3;}
.chip-orange{background:var(--gold-light);color:var(--gold);}
.chip-red{background:var(--red-light);color:var(--red);}
.chip-green{background:var(--green-light);color:var(--green);}
.chip-blue{background:var(--blue-light);color:var(--blue);}
.chip-gray{background:#EFEFEF;color:var(--ink2);}
.chip-purple{background:var(--purple-light);color:var(--purple);}
.card-arrow{width:28px;height:28px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.card:hover .card-arrow{background:var(--accent);color:white;}
.card-arrow svg{width:13px;height:13px;color:var(--ink3);transition:color 0.2s;}
.card:hover .card-arrow svg{color:white;}

/* ── PANEL ── */
.panel-bg{display:none;position:fixed;inset:0;background:rgba(10,10,20,0.45);z-index:200;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;}
.panel-bg.open{display:flex;}
@media(min-width:640px){.panel-bg.open{align-items:center;padding:20px;}.panel{border-radius:var(--r)!important;max-height:88vh!important;}}
.panel{background:var(--white);width:100%;max-width:600px;max-height:93vh;border-radius:var(--r) var(--r) 0 0;overflow-y:auto;scrollbar-width:none;animation:panelUp 0.35s cubic-bezier(0.34,1.1,0.64,1);box-shadow:0 -8px 60px rgba(0,0,0,0.18);padding-bottom:env(safe-area-inset-bottom,20px);}
.panel::-webkit-scrollbar{display:none;}
@keyframes panelUp{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.panel-drag{width:36px;height:4px;background:var(--line);border-radius:99px;margin:13px auto 0;}

/* Panel hero */
.panel-hero{padding:18px 20px 20px;display:flex;gap:15px;align-items:flex-start;border-bottom:1px solid var(--line);}
.panel-av{width:66px;height:66px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:23px;font-weight:800;overflow:hidden;flex-shrink:0;box-shadow:0 6px 20px rgba(0,0,0,0.14);}
.panel-av img{width:100%;height:100%;object-fit:cover;}
.panel-info{flex:1;}
.panel-name{font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-0.5px;line-height:1.1;}
.panel-church{font-size:13.5px;color:var(--ink2);margin-top:4px;font-weight:500;}
.panel-meta{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;}
.panel-close{width:30px;height:30px;border-radius:99px;background:var(--bg);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:13px;color:var(--ink2);transition:all 0.15s;}
.panel-close:hover{background:var(--ink);color:white;border-color:var(--ink);}

/* Action row */
.action-row{display:flex;gap:8px;padding:14px 20px;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;}
.action-row::-webkit-scrollbar{display:none;}
.action-btn{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;}
.action-ico{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:20px;transition:transform 0.15s;}
.action-btn:active .action-ico{transform:scale(0.9);}
.action-lbl{font-size:10.5px;font-weight:600;color:var(--ink2);}
.aico-call{background:var(--green-light);}
.aico-mail{background:var(--blue-light);}
.aico-web{background:var(--gold-light);}
.aico-map{background:var(--red-light);}
.aico-fb{background:#EEF3FF;}
.aico-ig{background:#FDF0FF;}

/* Panel sections */
.ps{padding:18px 20px 0;}
.ps-title{font-size:10.5px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:9px;}
.ps-card{background:var(--bg);border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--line);margin-bottom:18px;}
.ps-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line);}
.ps-row:last-child{border-bottom:none;}
.ps-ico{font-size:17px;width:22px;text-align:center;flex-shrink:0;}
.ps-info{flex:1;min-width:0;}
.ps-key{font-size:13px;font-weight:600;color:var(--ink);}
.ps-val{font-size:12px;color:var(--ink2);margin-top:1px;line-height:1.4;}
.ps-val a{color:var(--blue);text-decoration:none;font-weight:600;}
.ps-right{font-size:13px;color:var(--ink2);font-weight:500;text-align:right;max-width:160px;}
.ps-text{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px;font-size:13.5px;line-height:1.7;color:var(--ink2);margin-bottom:18px;font-weight:500;}

/* Hijos */
.hijo-card{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;margin-bottom:18px;}
.hijo-row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--line);}
.hijo-row:last-child{border-bottom:none;}
.hijo-av{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#667EEA,#764BA2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;flex-shrink:0;}
.hijo-name{font-size:13.5px;font-weight:700;color:var(--ink);flex:1;}
.hijo-age{font-size:11.5px;font-weight:700;padding:2px 8px;background:var(--blue-light);color:var(--blue);border-radius:99px;}
.hijo-detail{font-size:11.5px;color:var(--ink3);margin-top:2px;}

/* Pendientes */
.pend-list{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;margin-bottom:18px;}
.pend-item{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-bottom:1px solid var(--line);}
.pend-item:last-child{border-bottom:none;}
.pend-n{min-width:22px;height:22px;background:var(--gold-light);border-radius:7px;font-size:11px;font-weight:800;color:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.pend-t{font-size:13.5px;color:var(--ink);line-height:1.55;font-weight:500;}

/* Stats grid - mejorado */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px;}
.stat-box{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px;}
.stat-num{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-0.5px;}
.stat-lbl{font-size:11.5px;color:var(--ink2);margin-top:3px;line-height:1.3;font-weight:500;}

/* Métricas personales - visual mejorado */
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px;}
.metric-box{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px;text-align:center;position:relative;overflow:hidden;}
.metric-bar{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0;}
.metric-num{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1;}
.metric-lbl{font-size:10.5px;color:var(--ink3);margin-top:4px;font-weight:600;}
.metric-avg{background:var(--accent);color:white;border-color:var(--accent);}
.metric-avg .metric-num{color:white;font-size:28px;}
.metric-avg .metric-lbl{color:rgba(255,255,255,0.7);}

/* Oración tags */
.oracion-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;}
.oracion-tag{font-size:13px;font-weight:600;padding:7px 13px;border-radius:99px;background:var(--bg);border:1.5px solid var(--line);color:var(--ink2);line-height:1.3;}

/* Event rows */
.event-list{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;margin-bottom:18px;}
.event-row{display:flex;gap:10px;align-items:flex-start;padding:10px 13px;border-bottom:1px solid var(--line);}
.event-row:last-child{border-bottom:none;}
.event-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px;}
.event-body{flex:1;}
.event-name{font-size:13px;font-weight:700;color:var(--ink);}
.event-meta{font-size:11px;color:var(--ink3);font-weight:600;margin-top:2px;}
.event-desc{font-size:12px;color:var(--ink2);margin-top:2px;line-height:1.4;}

/* Próximos pasos */
.pasos-list{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;margin-bottom:18px;}
.paso-item{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-bottom:1px solid var(--line);}
.paso-item:last-child{border-bottom:none;}
.paso-who{font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px;flex-shrink:0;margin-top:2px;text-transform:uppercase;letter-spacing:0.05em;}
.paso-who-toño{background:var(--blue-light);color:var(--blue);}
.paso-who-yabeth{background:var(--purple-light);color:var(--purple);}
.paso-who-ambos{background:var(--green-light);color:var(--green);}
.paso-t{font-size:13.5px;color:var(--ink);line-height:1.55;font-weight:500;}

/* ── BOTTOM BAR ── */
.bottombar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--line);padding:10px 16px calc(10px + env(safe-area-inset-bottom,0px));display:flex;align-items:center;gap:10px;z-index:100;}
.bb-msg{font-size:13px;color:var(--ink2);flex:1;font-weight:500;}
.bb-btn{padding:10px 20px;border-radius:99px;border:none;font-size:13.5px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all 0.15s cubic-bezier(0.34,1.56,0.64,1);}
.bb-btn:active{transform:scale(0.95);}
.bb-edit{background:var(--accent);color:white;margin-left:auto;}
.bb-edit:hover{background:var(--accent2);}
.bb-exit{background:var(--red-light);color:var(--red);}
.bb-add{background:var(--green-light);color:var(--green);}
.bb-save{background:var(--green);color:white;}

/* ── EDIT FORM ── */
.ef-bg{display:none;position:fixed;inset:0;background:rgba(15,15,15,0.5);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.ef-bg.open{display:flex;}
@media(min-width:640px){.ef-bg.open{align-items:center;padding:20px;}.ef-panel{border-radius:var(--r)!important;}}
.ef-panel{background:var(--white);width:100%;max-width:560px;max-height:93vh;border-radius:var(--r) var(--r) 0 0;overflow-y:auto;scrollbar-width:none;animation:panelUp 0.3s cubic-bezier(0.34,1.1,0.64,1);box-shadow:0 -8px 60px rgba(0,0,0,0.15);padding-bottom:env(safe-area-inset-bottom,20px);}
.ef-panel::-webkit-scrollbar{display:none;}
.ef-nav{display:flex;align-items:center;padding:15px 20px;border-bottom:1px solid var(--line);}
.ef-nav-title{font-size:15px;font-weight:800;color:var(--ink);flex:1;text-align:center;letter-spacing:-0.2px;}
.ef-cancel{font-size:14px;font-weight:600;background:none;border:none;color:var(--red);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.ef-done{font-size:14px;font-weight:800;background:none;border:none;color:var(--blue);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.ef-body{padding:20px;}
.ef-group{margin-bottom:20px;}
.ef-group-title{font-size:10.5px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;}
.ef-fields{background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r-sm);overflow:hidden;}
.ef-field{display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--line);min-height:46px;}
.ef-field:last-child{border-bottom:none;}
.ef-lbl{font-size:13.5px;font-weight:600;color:var(--ink);min-width:90px;flex-shrink:0;}
.ef-inp,.ef-sel{flex:1;background:none;border:none;outline:none;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink2);text-align:right;padding:12px 0;font-weight:500;}
.ef-sel option{background:white;}
.ef-ta{width:100%;background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r-sm);padding:12px 14px;font-size:13.5px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);outline:none;min-height:80px;resize:vertical;line-height:1.6;font-weight:500;}
.ef-ta:focus{border-color:var(--accent);}
.ef-row-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line);}
.ef-row-item:last-child{border-bottom:none;}
.ef-row-item input{flex:1;background:none;border:none;outline:none;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);font-weight:500;}
.ef-row-item input::placeholder{color:var(--ink3);}
.ef-del{background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;}
.ef-add-btn{display:flex;align-items:center;gap:6px;width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r-sm);font-size:13.5px;font-weight:700;color:var(--blue);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-top:6px;transition:all 0.15s;}
.ef-add-btn:hover{background:var(--blue-light);border-color:var(--blue);}
.ef-pend-item{display:flex;align-items:flex-start;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line);}
.ef-pend-item:last-child{border-bottom:none;}
.ef-pend-ta{flex:1;background:none;border:none;outline:none;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);resize:none;min-height:38px;line-height:1.5;padding:4px 0;font-weight:500;}
.ef-pend-ta::placeholder{color:var(--ink3);}

.ef-submit:active{transform:scale(0.98);}

const grads=['av-0','av-1','av-2','av-3','av-4','av-5','av-6','av-7','av-8','av-9'];
function avC(p){const map={'av-teal':'av-2','av-blue':'av-8','av-purple':'av-0','av-amber':'av-6','av-coral':'av-1','av-gold':'av-4','av-green':'av-3','av-rose':'av-1'};if(map[p.color])return map[p.color];const h=[...(p.nombre||'')].reduce((a,c)=>a+c.charCodeAt(0),0);return grads[h%grads.length];}
function zL(z){return{centro:'Centro',norte:'Norte',sur:'Sur',otro:'Internacional',qro:'Querétaro'}[z]||z;}

function setZ(btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeZ=btn.dataset.z;render();}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=pastores.filter(p=>{const mz=activeZ==='todos'||(activeZ==='centro'&&(p.zona==='centro'||p.zona==='qro'))||p.zona===activeZ;const hay=[p.nombre,p.apellido||'',p.iglesia||'',p.ciudad||'',p.esposa||''].join(' ').toLowerCase();return mz&&(!q||hay.includes(q));});
  document.getElementById('top-count').textContent=filtered.length;
  const zones=activeZ==='todos'?['qro','centro','norte','sur','otro']:[activeZ==='centro'?'qro':'',activeZ].filter(Boolean);
  let html='';
  const seen=new Set();
  zones.forEach(z=>{
    const zp=filtered.filter(p=>p.zona===z&&!seen.has(p.nombre+p.apellido));
    if(!zp.length)return;
    zp.forEach(p=>seen.add(p.nombre+p.apellido));
    html+=`<div class="zone-section">`;
    if(activeZ==='todos'||activeZ==='centro')html+=`<div class="zone-label">${zL(z)}</div>`;
    zp.forEach(p=>{
      const idx=pastores.indexOf(p);
      const photo=pastorPhotos[p.nombre];
      const full=(p.nombre+' '+(p.apellido||'')).trim();
      const sub=[p.iglesia,p.ciudad].filter(Boolean).join(' · ');
      const hasPend=p.pendientes&&p.pendientes.length;
      const hasHealth=hasPend&&p.pendientes.some(x=>/salud|cirugía|médic/i.test(x));
      const hasRP=!!(p.reporte_personal);
      const avHtml=photo?`<div class="av"><img src="${photo}" alt="${full}"></div>`:`<div class="av ${avC(p)}">${(p.avatar||(p.nombre[0]+(p.apellido||'')[0]||'')).toUpperCase()}</div>`;
      html+=`<div class="card" onclick="editMode?openEF(${idx}):openPanel(${idx})">
        ${avHtml}
        <div class="card-body">
          <div class="card-name">${full}</div>
          <div class="card-church">${sub||'—'}</div>
          <div class="card-badges">
            <span class="${zC(p.zona)}">${zL(p.zona)}</span>
            ${p.esposa?`<span class="chip chip-gray">♡ ${p.esposa}</span>`:''}
            ${p.hijos&&p.hijos.length?`<span class="chip chip-gray">${p.hijos.length} hijo${p.hijos.length>1?'s':''}</span>`:''}
            ${hasRP?`<span class="chip chip-green">📊 reporte</span>`:''}
            ${hasHealth?'<span class="chip chip-red">⚕ salud</span>':hasPend?`<span class="chip chip-orange">${p.pendientes.length} pend.</span>`:''}
          </div>
        </div>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  if(!html)html='<div class="empty">Sin resultados</div>';
  document.getElementById('content').innerHTML=html;
}

  document.getElementById('bb-add').style.display=editMode?'':'none';
  document.getElementById('bb-save').style.display=editMode?'':'none';
  document.getElementById('bb-msg').textContent=editMode?'Toca una tarjeta para editar':'';
  render();
}

async function saveAll(){
  try{
    localStorage.setItem(SK,JSON.stringify(pastores));
    const msg=document.getElementById('bb-msg');
    msg.textContent='Guardando…';
    if(window.saveCloud){await window.saveCloud();msg.textContent='✓ Guardado en la nube';}
    else msg.textContent='✓ Guardado';
    setTimeout(()=>{msg.textContent=editMode?'Toca una tarjeta para editar':'';},2000);
    render();
  }catch(e){}
}

function openEF(idx){
  editIdx=idx;
  const p=idx===-1?{nombre:'',apellido:'',iglesia:'',ciudad:'',zona:'centro',esposa:'',cumple:'',avatar:'',color:'av-teal',hijos:[],notas:'',reunion:'',pendientes:[],tags:[]}:JSON.parse(JSON.stringify(pastores[idx]));
  const zO=['qro','centro','norte','sur','otro'].map(z=>`<option value="${z}" ${p.zona===z?'selected':''}>${zL(z)}</option>`).join('');
  const hH=(p.hijos||[]).map((c,i)=>`<div class="ef-row-item"><input placeholder="Nombre" value="${c.nombre||''}" oninput="eH(${i},'nombre',this.value)"><input placeholder="Edad" value="${c.edad||''}" style="max-width:55px;" oninput="eH(${i},'edad',this.value)"><button class="ef-del" onclick="rH(${i})">−</button></div>`).join('');
  const pH=(p.pendientes||[]).map((x,i)=>`<div class="ef-pend-item"><textarea class="ef-pend-ta" rows="2" oninput="eP(${i},this.value)">${x}</textarea><button class="ef-del" onclick="rP(${i})">−</button></div>`).join('');
  document.getElementById('ef-panel').innerHTML=`
    <div class="ef-nav"><button class="ef-cancel" onclick="closeEF()">Cancelar</button><div class="ef-nav-title">${idx===-1?'Nuevo pastor':'Editar pastor'}</div><button class="ef-done" onclick="saveForm()">Listo</button></div>
    <div class="ef-body">
      <div class="ef-group"><div class="ef-group-title">Información</div>
        <div class="ef-fields">
          <div class="ef-field"><span class="ef-lbl">Nombre</span><input class="ef-inp" value="${p.nombre}" placeholder="Nombre" oninput="eT('nombre',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Apellido</span><input class="ef-inp" value="${p.apellido||''}" placeholder="Apellido" oninput="eT('apellido',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Iglesia</span><input class="ef-inp" value="${p.iglesia||''}" placeholder="Nombre iglesia" oninput="eT('iglesia',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Ciudad</span><input class="ef-inp" value="${p.ciudad||''}" placeholder="Ciudad" oninput="eT('ciudad',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Zona</span><select class="ef-sel" onchange="eT('zona',this.value)">${zO}</select></div>
          <div class="ef-field"><span class="ef-lbl">Esposa</span><input class="ef-inp" value="${p.esposa||''}" placeholder="Nombre" oninput="eT('esposa',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Cumpleaños</span><input class="ef-inp" value="${p.cumple||''}" placeholder="15 ene 1985" oninput="eT('cumple',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Iniciales</span><input class="ef-inp" value="${p.avatar||''}" placeholder="GA" maxlength="3" oninput="eT('avatar',this.value)"></div>
        </div>
      </div>
      <div class="ef-group"><div class="ef-group-title">Hijos</div>
        <div class="ef-fields" id="hijos-list">${hH||'<div style="padding:12px 14px;color:var(--ink3);font-size:13px;font-weight:500;">Sin hijos registrados</div>'}</div>
        <button class="ef-add-btn" onclick="addH()">+ Agregar hijo</button>
      </div>
      <div class="ef-group"><div class="ef-group-title">Notas personales</div><textarea class="ef-ta" placeholder="Escribe aquí..." oninput="eT('notas',this.value)">${p.notas||''}</textarea></div>
      <div class="ef-group"><div class="ef-group-title">Última reunión</div><textarea class="ef-ta" placeholder="Notas de la reunión..." oninput="eT('reunion',this.value)">${p.reunion||''}</textarea></div>
      <div class="ef-group"><div class="ef-group-title">Pendientes para Kike</div>
        <div class="ef-fields" id="pend-list">${pH||'<div style="padding:12px 14px;color:var(--ink3);font-size:13px;font-weight:500;">Sin pendientes</div>'}</div>
        <button class="ef-add-btn" onclick="addP()">+ Agregar pendiente</button>
      </div>
      <button class="ef-submit ef-submit-save" onclick="saveForm()">Guardar cambios</button>
      ${idx!==-1?`<button class="ef-submit ef-submit-delete" onclick="delP(${idx})">Eliminar pastor</button>`:''}
    </div>`;
  window._et=p;
  document.getElementById('ef-bg').classList.add('open');
}
function eT(f,v){if(window._et)window._et[f]=v;}
function eH(i,f,v){if(window._et&&window._et.hijos)window._et.hijos[i][f]=v;}
function rH(i){if(window._et){window._et.hijos.splice(i,1);openEF(editIdx);}}
function addH(){if(window._et){if(!window._et.hijos)window._et.hijos=[];window._et.hijos.push({nombre:'',edad:'',datos:''});openEF(editIdx);}}
function eP(i,v){if(window._et&&window._et.pendientes)window._et.pendientes[i]=v;}
function rP(i){if(window._et){window._et.pendientes.splice(i,1);openEF(editIdx);}}
function addP(){if(window._et){if(!window._et.pendientes)window._et.pendientes=[];window._et.pendientes.push('');openEF(editIdx);}}
function saveForm(){const p=window._et;if(!p||!p.nombre){alert('El nombre es obligatorio');return;}if(!p.avatar)p.avatar=(p.nombre[0]+((p.apellido||'')[0]||'')).toUpperCase();if(!p.tags)p.tags=[];p.pendientes=(p.pendientes||[]).filter(x=>x.trim());p.hijos=(p.hijos||[]).filter(h=>h.nombre);if(editIdx===-1)pastores.push(p);else pastores[editIdx]=p;saveAll();closeEF();render();}
function delP(i){if(!confirm('¿Eliminar a '+pastores[i].nombre+'?'))return;pastores.splice(i,1);saveAll();closeEF();render();}
function closeEF(e){if(e&&e.target!==document.getElementById('ef-bg'))return;document.getElementById('ef-bg').classList.remove('open');window._et=null;editIdx=-1;}

render();
</script>
</body>
</html>
