<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pastores CEM</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  const cfg={apiKey:"AIzaSyACo7a3uVsGwAdii3d8W3NmXvLVBdgTF1A",authDomain:"pastores-cem.firebaseapp.com",projectId:"pastores-cem",storageBucket:"pastores-cem.firebasestorage.app",messagingSenderId:"45247752354",appId:"1:45247752354:web:eb41da403d38c72d788ffb"};
  const app=initializeApp(cfg);const db=getFirestore(app);
  window.db=db;window.fsDoc=doc;window.fsSetDoc=setDoc;window.fsCollection=collection;window.fsGetDocs=getDocs;
  async function load(){try{const snap=await getDocs(collection(db,"pastores"));if(!snap.empty){const d=[];snap.forEach(x=>d.push(x.data()));d.sort((a,b)=>a.nombre.localeCompare(b.nombre));window._fb_pastores=d;}}catch(e){console.warn(e);}}
  window.addEventListener('load',()=>setTimeout(load,300));
</script>
<style>
:root{
  --bg:#0A0A0A;--surface:#141414;--surface2:#1C1C1C;
  --border:#252525;--border2:#303030;
  --ink:#F2EEE8;--ink2:#8A847E;--ink3:#444;
  --amber:#E8A820;--red:#D63939;--green:#22A05A;--blue:#3A8EE8;
  --qro:#E8A820;--norte:#3A8EE8;--sur:#22A05A;--centro:#D63939;--intl:#9B72E8;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;--display:'Bebas Neue',sans-serif;
  --r:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--sans);}

/* ── APP SHELL ── */
.app{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidenav{
  width:190px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding-top:52px;overflow-y:auto;scrollbar-width:none;
}
.sidenav::-webkit-scrollbar{display:none;}
@media(max-width:768px){.sidenav{display:none;}}
.sn-sect{padding:14px 12px 4px;font-family:var(--mono);font-size:8px;color:var(--ink3);letter-spacing:0.15em;text-transform:uppercase;}
.nav-btn{
  display:flex;align-items:center;gap:9px;
  padding:8px 13px;margin:1px 7px;border-radius:4px;
  cursor:pointer;font-size:12px;font-weight:600;color:var(--ink2);
  border:none;background:none;font-family:var(--sans);text-align:left;
  width:calc(100% - 14px);transition:all 0.12s;
}
.nav-btn:hover{background:var(--surface2);color:var(--ink);}
.nav-btn.active{background:rgba(232,168,32,0.1);color:var(--amber);}
.nav-ico{font-size:14px;width:16px;text-align:center;flex-shrink:0;}
.nav-badge{
  margin-left:auto;font-family:var(--mono);font-size:9px;
  background:var(--border2);color:var(--ink3);
  padding:1px 6px;border-radius:99px;min-width:22px;text-align:center;
}
.nav-btn.active .nav-badge{background:rgba(232,168,32,0.2);color:var(--amber);}

/* ── MAIN ── */
.app-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;}

/* ── TOOLBAR ── */
.toolbar{
  position:relative;z-index:100;
  display:flex;align-items:center;gap:12px;flex-wrap:nowrap;
  padding:10px 16px;
  background:rgba(14,14,14,0.95);border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.brand-mark{width:32px;height:32px;background:var(--amber);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:11px;color:#000;clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));}
.brand-name{font-family:var(--display);font-size:20px;color:var(--ink);letter-spacing:1px;}
.brand-sub{font-family:var(--mono);font-size:8px;color:var(--ink3);letter-spacing:0.15em;text-transform:uppercase;margin-top:1px;}
.t-sep{width:1px;height:22px;background:var(--border2);flex-shrink:0;}
.search-wrap{flex:1;max-width:240px;position:relative;}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--ink3);pointer-events:none;}
.search-inp{width:100%;padding:6px 10px 6px 28px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);font-size:11.5px;font-family:var(--mono);color:var(--ink);outline:none;transition:border-color 0.2s;}
.search-inp::placeholder{color:var(--ink3);}
.search-inp:focus{border-color:var(--amber);}
.zpills{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.zpills::-webkit-scrollbar{display:none;}
.zpill{padding:4px 11px;background:transparent;border:1px solid var(--border2);border-radius:2px;font-size:10px;font-weight:700;font-family:var(--mono);color:var(--ink3);cursor:pointer;white-space:nowrap;transition:all 0.12s;letter-spacing:0.06em;text-transform:uppercase;}
.zpill:hover{border-color:var(--amber);color:var(--amber);}
.zpill.active{background:var(--amber);border-color:var(--amber);color:#000;}
.t-count{font-family:var(--mono);font-size:10px;color:var(--ink3);flex-shrink:0;}
.tb-btn{padding:6px 13px;border:1px solid var(--border2);border-radius:2px;background:transparent;font-size:10px;font-weight:700;font-family:var(--mono);color:var(--ink2);cursor:pointer;transition:all 0.12s;letter-spacing:0.08em;text-transform:uppercase;flex-shrink:0;}
.tb-btn:hover{border-color:var(--ink);color:var(--ink);}
.tb-btn-exit{border-color:var(--red);color:var(--red);}
.tb-btn-add{border-color:var(--green);color:var(--green);}
.tb-btn-save{border-color:var(--amber);color:var(--amber);}

/* ── VIEWS ── */
.view{flex:1;overflow:auto;display:none;}
.view.active{display:block;}

/* ── PASTORES VIEW ── */
#view-pastores{padding:20px 16px 80px;}
.zone-cluster{margin-bottom:36px;}
.zone-hdr{display:flex;align-items:center;gap:10px;padding:10px 0 12px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.zone-num{font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:0.1em;}
.zone-ttl{font-family:var(--display);font-size:32px;letter-spacing:3px;line-height:1;}
.zone-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;border-radius:2px;letter-spacing:0.08em;text-transform:uppercase;}
.zone-rule{flex:1;height:1px;opacity:0.2;}
.zc-qro .zone-ttl{color:var(--qro);}.zc-qro .zone-badge{background:rgba(232,168,32,0.12);color:var(--qro);}.zc-qro .zone-rule{background:var(--qro);}
.zc-norte .zone-ttl{color:var(--norte);}.zc-norte .zone-badge{background:rgba(58,142,232,0.12);color:var(--norte);}.zc-norte .zone-rule{background:var(--norte);}
.zc-sur .zone-ttl{color:var(--sur);}.zc-sur .zone-badge{background:rgba(34,160,90,0.12);color:var(--sur);}.zc-sur .zone-rule{background:var(--sur);}
.zc-centro .zone-ttl{color:var(--centro);}.zc-centro .zone-badge{background:rgba(214,57,57,0.12);color:var(--centro);}.zc-centro .zone-rule{background:var(--centro);}
.zc-otro .zone-ttl{color:var(--intl);}.zc-otro .zone-badge{background:rgba(155,114,232,0.12);color:var(--intl);}.zc-otro .zone-rule{background:var(--intl);}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
@media(min-width:900px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));}}

/* ── CARD ── */
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;overflow:hidden;transition:transform 0.2s cubic-bezier(0.34,1.4,0.64,1),box-shadow 0.2s,border-color 0.15s;animation:cin 0.35s ease backwards;position:relative;}
@keyframes cin{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.pcard:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.6);border-color:var(--border2);}
.pcard.edit-mode{outline:1px dashed var(--red);outline-offset:2px;}
.card-hero{position:relative;height:120px;overflow:hidden;}
.card-hero-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative;}
.php-city{font-family:var(--display);font-size:28px;letter-spacing:3px;color:rgba(255,255,255,0.9);position:relative;z-index:1;text-shadow:0 2px 8px rgba(0,0,0,0.5);}
.php-church{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.55);position:relative;z-index:1;text-align:center;padding:0 8px;}
.card-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,0.7) 100%);}
.card-av-wrap{position:absolute;bottom:-22px;left:14px;z-index:10;}
.card-av{width:52px;height:52px;border-radius:50%;border:3px solid var(--surface);overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:18px;color:#000;box-shadow:0 4px 16px rgba(0,0,0,0.5);transition:transform 0.2s;}
.pcard:hover .card-av{transform:scale(1.08);}
.card-av img{width:100%;height:100%;object-fit:cover;}
.card-accent{position:absolute;left:0;top:0;bottom:0;width:3px;z-index:5;}
.card-body{padding:28px 14px 14px;}
.card-name{font-family:var(--display);font-size:19px;letter-spacing:0.5px;color:var(--ink);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-church{font-family:var(--mono);font-size:10px;color:var(--ink2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.ctag{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 7px;border-radius:2px;letter-spacing:0.06em;text-transform:uppercase;}
.ctag-spouse{background:#1a0d12;color:#C080A0;}
.ctag-kids{background:#0a1020;color:#6090C0;}
.ctag-report{background:#091a10;color:var(--green);}
.ctag-pend{background:#1a1200;color:var(--amber);}
.ctag-health{background:#1a0808;color:var(--red);}
.card-metrics{display:flex;gap:4px;padding-top:10px;margin-top:10px;border-top:1px solid var(--border);}
.cm-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
.cm-track{width:100%;height:24px;background:var(--border);border-radius:2px;overflow:hidden;display:flex;align-items:flex-end;}
.cm-fill{width:100%;border-radius:1px;min-height:1px;}
.cm-val{font-family:var(--mono);font-size:9px;font-weight:600;}
.cm-lbl{font-family:var(--mono);font-size:7.5px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.05em;}

/* ── PANEL ── */
.panel-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;backdrop-filter:blur(8px);align-items:stretch;justify-content:flex-end;}
.panel-bg.open{display:flex;}
@media(min-width:640px){.panel-bg{align-items:center;padding:16px;}.panel{border-radius:var(--r)!important;max-height:calc(100vh - 32px)!important;}}
.panel{background:var(--surface);width:100%;max-width:460px;height:100%;max-height:100vh;overflow-y:auto;scrollbar-width:none;animation:sIn 0.28s cubic-bezier(0.22,1,0.36,1);border-left:1px solid var(--border);}
.panel::-webkit-scrollbar{display:none;}
@keyframes sIn{from{transform:translateX(30px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.panel-hero{position:relative;height:200px;overflow:hidden;flex-shrink:0;}
.panel-hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.panel-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.2) 0%,rgba(0,0,0,0.75) 100%);}
.panel-church-badge{position:absolute;bottom:60px;left:20px;font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.7);}
.panel-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.8);border-radius:2px;transition:all 0.12s;z-index:10;}
.panel-close:hover{background:var(--red);border-color:var(--red);color:white;}
.panel-pastor-row{display:flex;align-items:flex-end;gap:14px;padding:0 20px;margin-top:-36px;position:relative;z-index:5;margin-bottom:16px;}
.panel-av{width:72px;height:72px;border-radius:50%;border:3px solid var(--surface);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:24px;color:#000;box-shadow:0 6px 20px rgba(0,0,0,0.5);}
.panel-av img{width:100%;height:100%;object-fit:cover;}
.panel-info{flex:1;padding-bottom:4px;}
.panel-name{font-family:var(--display);font-size:32px;letter-spacing:2px;color:var(--ink);line-height:1;}
.panel-sub{font-family:var(--mono);font-size:10px;color:var(--ink2);margin-top:4px;letter-spacing:0.06em;text-transform:uppercase;}
.ps{padding:14px 20px 0;}
.psl{font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:7px;}
.ps-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.ps-row{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;border-bottom:1px solid var(--border);}
.ps-row:last-child{border-bottom:none;}
.ps-ico{font-size:13px;width:16px;text-align:center;flex-shrink:0;margin-top:1px;}
.ps-key{font-size:12px;font-weight:600;color:var(--ink);flex:1;}
.ps-val{font-family:var(--mono);font-size:10.5px;color:var(--ink2);text-align:right;max-width:200px;line-height:1.5;}
.ps-text{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;font-size:12.5px;line-height:1.75;color:var(--ink2);margin-bottom:12px;}
.hijos-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.hijo-chip{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:7px 11px;display:flex;align-items:center;gap:8px;}
.hijo-av{width:26px;height:26px;background:var(--border2);border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:13px;color:var(--ink2);flex-shrink:0;}
.hijo-name{font-size:12px;font-weight:700;color:var(--ink);}
.hijo-age{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:1px;}
.metrics-panel{display:flex;gap:5px;align-items:flex-end;height:80px;margin-bottom:12px;}
.mp-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.mp-track{width:100%;flex:1;background:var(--border);border-radius:2px;overflow:hidden;display:flex;align-items:flex-end;}
.mp-fill{width:100%;border-radius:2px 2px 0 0;min-height:2px;}
.mp-val{font-family:var(--mono);font-size:11px;font-weight:600;}
.mp-key{font-family:var(--mono);font-size:8px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.06em;}
.mp-avg{background:var(--amber);border-radius:var(--r);padding:8px;text-align:center;flex-shrink:0;width:48px;}
.mp-avg-n{font-family:var(--display);font-size:24px;color:#000;line-height:1;}
.mp-avg-l{font-family:var(--mono);font-size:7.5px;color:rgba(0,0,0,0.6);text-transform:uppercase;letter-spacing:0.1em;}
.prayer-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.prayer-tag{font-family:var(--mono);font-size:10px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:2px;color:var(--ink2);}
.pend-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.pend-item{display:flex;gap:9px;align-items:flex-start;padding:9px 13px;border-bottom:1px solid var(--border);}
.pend-item:last-child{border-bottom:none;}
.pend-n{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--amber);min-width:18px;margin-top:2px;}
.pend-t{font-size:12.5px;color:var(--ink);line-height:1.6;}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px;}
.stat-tile{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;}
.stat-n{font-family:var(--display);font-size:20px;color:var(--ink);letter-spacing:0.5px;line-height:1;}
.stat-l{font-family:var(--mono);font-size:9.5px;color:var(--ink3);margin-top:3px;}
.panel-actions{display:flex;gap:7px;padding:12px 20px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.panel-actions::-webkit-scrollbar{display:none;}
.pact{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;}
.pact-ico{width:42px;height:42px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:17px;transition:transform 0.15s;}
.pact:active .pact-ico{transform:scale(0.9);}
.pact-lbl{font-family:var(--mono);font-size:8.5px;color:var(--ink3);letter-spacing:0.06em;text-transform:uppercase;}

/* ── DASHBOARD VIEW ── */
#view-dashboard{padding:20px 16px 80px;}
.dash-title{font-family:var(--display);font-size:32px;letter-spacing:3px;color:var(--ink);margin-bottom:4px;}
.dash-sub{font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:0.1em;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
@media(min-width:600px){.kpis{grid-template-columns:repeat(4,1fr);}}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi-a::before{background:var(--amber);}.kpi-b::before{background:var(--blue);}.kpi-r::before{background:var(--red);}.kpi-g::before{background:var(--green);}
.kpi-n{font-family:var(--display);font-size:36px;letter-spacing:1px;line-height:1;color:var(--ink);}
.kpi-l{font-family:var(--mono);font-size:9px;color:var(--ink3);margin-top:4px;letter-spacing:0.08em;text-transform:uppercase;}
.dsect{font-family:var(--display);font-size:16px;letter-spacing:2px;color:var(--ink2);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.bday-list,.alert-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.bday-row,.alert-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 13px;}
.alert-row{border-left:3px solid var(--amber);align-items:flex-start;}
.alert-row.ar{border-left-color:var(--red);}.alert-row.ag{border-left-color:var(--green);}
.bday-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:13px;color:#000;flex-shrink:0;overflow:hidden;}
.bday-av img{width:100%;height:100%;object-fit:cover;}
.bday-name{font-size:13px;font-weight:600;color:var(--ink);flex:1;}
.bday-date{font-family:var(--mono);font-size:10px;color:var(--ink3);}
.bday-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px;background:rgba(232,168,32,0.15);color:var(--amber);}
.alert-ico{font-size:14px;margin-top:1px;flex-shrink:0;}
.alert-ttl{font-size:12.5px;font-weight:700;color:var(--ink);}
.alert-desc{font-size:11.5px;color:var(--ink2);margin-top:2px;line-height:1.5;}

/* ── REPORTES VIEW ── */
#view-reportes{padding:20px 16px 80px;}
.view-title{font-family:var(--display);font-size:28px;letter-spacing:2px;color:var(--ink);margin-bottom:4px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.filters{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap;}

/* ── NAVIGATION ── */
let currentView='pastores';
function goTo(view, btn){
  currentView=view;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('[data-view]').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('[data-view="'+view+'"]').forEach(b=>b.classList.add('active'));
  document.getElementById('view-'+view).classList.add('active');
  const tb=document.getElementById('toolbar');
  tb.style.display=view==='pastores'?'':'none';
  if(view==='pastores') renderPastores();
  if(view==='dashboard') renderDashboard();
  if(view==='reportes') renderReportes();
  if(view==='seguimiento') renderSeguimiento();
}

function updateBadges(){
  const tp=pastores.reduce((s,p)=>s+(p.pendientes||[]).length,0);
  const wr=pastores.filter(p=>p.reporte_personal).length;
  document.getElementById('nb-pastores').textContent=pastores.length;
  document.getElementById('nb-reportes').textContent=wr;
  document.getElementById('nb-seg').textContent=tp;
}

/* ── PASTORES VIEW ── */
let activeZ='todos', editMode=false;
function setZ(btn){
  document.querySelectorAll('.zpill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeZ=btn.dataset.z;
  renderPastores();
}

function renderPastores(){
  const q=(document.getElementById('search')||{value:''}).value.toLowerCase().trim();
  const filtered=pastores.filter(p=>{
    const mz=activeZ==='todos'||p.zona===activeZ;
    const hay=[p.nombre,p.apellido||'',p.iglesia||'',p.ciudad||'',p.esposa||''].join(' ').toLowerCase();
    return mz&&(!q||hay.includes(q));
  });
  document.getElementById('top-count').textContent=filtered.length+'/'+pastores.length;

  const zones=activeZ==='todos'?ZONES:ZONES.filter(z=>z.id===activeZ);
  const seen=new Set();
  let html='<div style="padding:20px 16px 80px">';

  zones.forEach((z,zi)=>{
    const zp=filtered.filter(p=>p.zona===z.id&&!seen.has(p.nombre+p.apellido));
    if(!zp.length)return;
    zp.forEach(p=>seen.add(p.nombre+p.apellido));
    html+=`<div class="zone-cluster zc-${z.id}">
      <div class="zone-hdr">
        <span class="zone-num">0${zi+1}</span>
        <span class="zone-ttl">${z.label}</span>
        <span class="zone-badge">${zp.length}</span>
        <div class="zone-rule"></div>
      </div>
      <div class="cards-grid">`;

    zp.forEach((p,i)=>{
      const idx=pastores.indexOf(p);
      const full=(p.nombre+' '+(p.apellido||'')).trim();
      const photo=pastorPhotos[p.nombre];
      const col=pcol(p);
      const zc=ZCOLORS[p.zona]||'#888';
      const ch=churchPhotos[p.iglesia]||{grad:'linear-gradient(135deg,#111,#1a1a1a)',city:p.ciudad||''};
      const hasPend=p.pendientes&&p.pendientes.length;
      const hasHealth=hasPend&&p.pendientes.some(x=>/salud|cirugía/i.test(x));
      const hasRP=!!p.reporte_personal;

      const avHtml=photo
        ?`<div class="card-av"><img src="${photo}" loading="lazy"></div>`
        :`<div class="card-av" style="background:${col}">${(p.avatar||(p.nombre[0]+(p.apellido||'')[0]||'')).toUpperCase()}</div>`;

      let bars='';
      if(hasRP&&p.reporte_personal.metricas){
        const m=p.reporte_personal.metricas;
        bars='<div class="card-metrics">';
        [['familia','FAM'],['intimidad','INT'],['entusiasmo','ENT']].forEach(([k,lbl])=>{
          if(m[k]===undefined)return;
          const v=m[k],pct=Math.round(v*10),fc=v>=9?'#22A05A':v>=7?'#E8A820':'#D63939';
          bars+=`<div class="cm-col"><div class="cm-val" style="color:${fc}">${v}</div><div class="cm-track"><div class="cm-fill" style="height:${pct}%;background:${fc}"></div></div><div class="cm-lbl">${lbl}</div></div>`;
        });
        bars+='</div>';
      }

      html+=`<div class="pcard${editMode?' edit-mode':''}" style="animation-delay:${i*0.03}s" onclick="${editMode?`openEF(${idx})`:`openPanel(${idx})`}">
        <div class="card-hero">
          <div class="card-hero-ph" style="background:${ch.grad}">
            <div class="php-city">${(ch.city||'').toUpperCase()}</div>
            <div class="php-church">${p.iglesia||''}</div>
          </div>
          <div class="card-hero-overlay"></div>
          <div class="card-av-wrap">${avHtml}</div>
          <div class="card-accent" style="background:${zc}"></div>
        </div>
        <div class="card-body">
          <div class="card-name">${full}</div>
          <div class="card-church">${p.iglesia||'—'}</div>
          <div class="card-tags">
            ${p.esposa?`<span class="ctag ctag-spouse">♡ ${p.esposa}</span>`:''}
            ${p.hijos&&p.hijos.length?`<span class="ctag ctag-kids">${p.hijos.length} hijos</span>`:''}
            ${hasRP?`<span class="ctag ctag-report">▶ ${p.reporte_personal.fecha||'reporte'}</span>`:''}
            ${hasHealth?`<span class="ctag ctag-health">⚕ salud</span>`:hasPend?`<span class="ctag ctag-pend">${p.pendientes.length} pend.</span>`:''}
          </div>
          ${bars}
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });

  if(!seen.size) html+=`<div class="empty-state"><div class="empty-icon">◎</div><div class="empty-text">SIN RESULTADOS</div></div>`;
  html+='</div>';
  document.getElementById('view-pastores').innerHTML=html;
}

/* ── PANEL ── */
function openPanel(idx){
  const p=pastores[idx];
  const d=directorio[p.nombre]||directorio[(p.nombre||'').split(' ')[0]]||{};
  const full=(p.nombre+' '+(p.apellido||'')).trim();
  const photo=pastorPhotos[p.nombre];
  const col=pcol(p);
  const zc=ZCOLORS[p.zona]||'#888';
  const ch=churchPhotos[p.iglesia]||{grad:'linear-gradient(135deg,#111,#1a1a1a)',city:p.ciudad||''};

  const avHtml=photo
    ?`<div class="panel-av"><img src="${photo}"></div>`
    :`<div class="panel-av" style="background:${col}">${(p.avatar||(p.nombre[0]+(p.apellido||'')[0]||'')).toUpperCase()}</div>`;

  let h=`<div class="panel-hero">
    <div class="panel-hero-ph" style="background:${ch.grad}">
      <div style="font-family:var(--display);font-size:55px;letter-spacing:6px;color:rgba(255,255,255,0.12)">${(ch.city||'').toUpperCase()}</div>
    </div>
    <div class="panel-hero-overlay"></div>
    <div class="panel-church-badge">${p.iglesia||''}</div>
    <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:${zc}"></div>
    <button class="panel-close" onclick="document.getElementById('panel-bg').classList.remove('open')">✕</button>
  </div>
  <div class="panel-pastor-row">
    ${avHtml}
    <div class="panel-info">
      <div class="panel-name">${full}</div>
      <div class="panel-sub">${p.ciudad||''}</div>
    </div>
  </div>`;

  // Actions
  const acts=[];
  if(d.tel)acts.push(`<div class="pact" onclick="window.location='tel:${d.tel}'"><div class="pact-ico" style="background:rgba(34,160,90,0.15);color:#22A05A">📞</div><div class="pact-lbl">Llamar</div></div>`);
  if(d.email)acts.push(`<div class="pact" onclick="window.location='mailto:${d.email}'"><div class="pact-ico" style="background:rgba(58,142,232,0.15);color:#3A8EE8">✉️</div><div class="pact-lbl">Email</div></div>`);
  if(d.web)acts.push(`<div class="pact" onclick="window.open('${d.web}','_blank')"><div class="pact-ico" style="background:rgba(232,168,32,0.15);color:#E8A820">🌐</div><div class="pact-lbl">Web</div></div>`);
  if(d.facebook)acts.push(`<div class="pact" onclick="window.open('${d.facebook}','_blank')"><div class="pact-ico" style="background:rgba(58,80,180,0.15);color:#4A60CC">📘</div><div class="pact-lbl">Facebook</div></div>`);
  if(acts.length)h+=`<div class="panel-actions">${acts.join('')}</div>`;

  if(d.horarios)h+=`<div class="ps"><div class="psl">Servicios</div><div class="ps-block"><div class="ps-row"><div class="ps-ico">🕐</div><div class="ps-key">Horarios</div><div class="ps-val">${d.horarios}</div></div></div></div>`;

  if(p.esposa||p.cumple){
    h+=`<div class="ps"><div class="psl">Personal</div><div class="ps-block">`;
    if(p.esposa)h+=`<div class="ps-row"><div class="ps-ico">💝</div><div class="ps-key">Esposa</div><div class="ps-val">${p.esposa}</div></div>`;
    if(p.cumple)h+=`<div class="ps-row"><div class="ps-ico">🎂</div><div class="ps-key">Cumpleaños</div><div class="ps-val">${p.cumple}</div></div>`;
    h+=`</div></div>`;
  }

  if(p.hijos&&p.hijos.length){
    h+=`<div class="ps"><div class="psl">Hijos</div><div class="hijos-row">`;
    p.hijos.forEach(c=>{h+=`<div class="hijo-chip"><div class="hijo-av">${(c.nombre||'?')[0]}</div><div><div class="hijo-name">${c.nombre}</div><div class="hijo-age">${c.edad?c.edad+'a · ':''}${c.datos||''}</div></div></div>`;});
    h+=`</div></div>`;
  }

  function renderMetrics(rp, title){
    if(!rp||!rp.metricas) return '';
    const keys=[['familia','FAM'],['intimidad','INT'],['entusiasmo','ENT'],['liderazgo','LID'],['economia','ECO'],['salud','SAL']];
    const vals=keys.filter(([k])=>rp.metricas[k]!==undefined);
    if(!vals.length) return '';
    const avg=(vals.reduce((s,[k])=>s+rp.metricas[k],0)/vals.length).toFixed(1);
    let o=`<div class="ps"><div class="psl">${title}</div><div class="metrics-panel">`;
    vals.forEach(([k,lbl])=>{
      const v=rp.metricas[k],pct=Math.round(v*10),fc=v>=9?'#22A05A':v>=7?'#E8A820':'#D63939';
      o+=`<div class="mp-col"><div class="mp-val" style="color:${fc}">${v}</div><div class="mp-track"><div class="mp-fill" style="height:${pct}%;background:${fc}"></div></div><div class="mp-key">${lbl}</div></div>`;
    });
    o+=`<div class="mp-avg"><div class="mp-avg-n">${avg}</div><div class="mp-avg-l">PROM</div></div></div>`;
    if(rp.oracion&&rp.oracion.length){
      const items=Array.isArray(rp.oracion)?rp.oracion:rp.oracion.split(/[·\n,]/).map(x=>x.trim()).filter(Boolean);
      o+=`<div class="psl" style="margin:8px 20px 6px">Oración</div><div style="padding:0 20px"><div class="prayer-row">`;
      items.forEach(x=>o+=`<span class="prayer-tag">— ${x}</span>`);
      o+=`</div></div>`;
    }
    return o+`</div>`;
  }

  if(p.reporte_personal) h+=renderMetrics(p.reporte_personal,'Reporte — '+(p.reporte_personal.fecha||''));
  if(p.reporte_personal_yabeth) h+=renderMetrics(p.reporte_personal_yabeth,'Reporte Yabeth — Abril 2026');
  if(p.reunion) h+=`<div class="ps"><div class="psl">Última reunión</div><div class="ps-text">${p.reunion}</div></div>`;
  if(p.notas) h+=`<div class="ps"><div class="psl">Notas</div><div class="ps-text">${p.notas}</div></div>`;

  if(p.iglesia_reporte){
    const ir=p.iglesia_reporte;
    h+=`<div class="ps"><div class="psl">Iglesia — Reporte 2025</div>`;
    if(ir.stats){h+=`<div class="stats-grid">`;ir.stats.forEach(s=>h+=`<div class="stat-tile"><div class="stat-n">${s.valor}</div><div class="stat-l">${s.label}</div></div>`);h+=`</div>`;}
    if(ir.logros) h+=`<div class="ps-text">${ir.logros}</div>`;
    if(ir.plan2026) h+=`<div class="psl" style="margin:0 20px 6px">Plan 2026</div><div style="padding:0 20px"><div class="ps-text">${ir.plan2026}</div></div>`;
    h+=`</div>`;
  }

  if(p.pendientes&&p.pendientes.length){
    h+=`<div class="ps"><div class="psl">Pendientes</div><div class="pend-block">`;
    p.pendientes.forEach((x,i)=>h+=`<div class="pend-item"><span class="pend-n">${String(i+1).padStart(2,'0')}</span><span class="pend-t">${x}</span></div>`);
    h+=`</div></div>`;
  }
  h+=`<div style="height:24px"></div>`;

  document.getElementById('panel').innerHTML=h;
  document.getElementById('panel-bg').classList.add('open');
}

/* ── DASHBOARD ── */
function renderDashboard(){
  const MONTHS={enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12,ene:1,feb:2,mar:3,abr:4,may:5,jun:6,jul:7,ago:8,sep:9,oct:10,nov:11,dic:12};
  const now=new Date();
  function parseBday(s){
    if(!s)return null;
    const parts=s.toLowerCase().split(/[\s,\/]+/).filter(Boolean);
    let d=null,m=null;
    parts.forEach(pt=>{const n=parseInt(pt);if(!isNaN(n)&&n<=31)d=n;const ml=MONTHS[pt];if(ml)m=ml;});
    return(d&&m)?{d,m}:null;
  }
  function daysUntil(m,d){
    const y=now.getFullYear();let next=new Date(y,m-1,d);
    if(next<=now)next=new Date(y+1,m-1,d);
    return Math.round((next-now)/(1000*60*60*24));
  }
  const upcoming=[];
  pastores.forEach(p=>{const bd=parseBday(p.cumple);if(bd){const days=daysUntil(bd.m,bd.d);if(days<=45)upcoming.push({p,days});}});
  upcoming.sort((a,b)=>a.days-b.days);

  const alerts=[];
  pastores.filter(p=>(p.pendientes||[]).some(x=>/salud|cirugía/i.test(x))).forEach(p=>{
    const t=p.pendientes.find(x=>/salud|cirugía/i.test(x));
    alerts.push({type:'r',ico:'⚕',title:`${p.nombre} ${p.apellido||''} — Salud`,desc:t});
  });
  pastores.filter(p=>(p.pendientes||[]).length>=5).forEach(p=>{
    alerts.push({type:'',ico:'⏳',title:`${p.nombre} — ${p.pendientes.length} pendientes`,desc:p.pendientes[0]});
  });
  pastores.filter(p=>p.tags&&p.tags.includes('nuevo')).forEach(p=>{
    alerts.push({type:'ag',ico:'🌱',title:`${p.nombre} ${p.apellido||''} — Recién integrado`,desc:`${p.iglesia} · ${p.ciudad}`});
  });

  const totalPend=pastores.reduce((s,p)=>s+(p.pendientes||[]).length,0);
  const withRP=pastores.filter(p=>p.reporte_personal);

  let h=`<div style="padding:20px 16px 80px">
    <div class="dash-title">DASHBOARD</div>
    <div class="dash-sub">${now.toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase()}</div>
    <div class="kpis">
      <div class="kpi kpi-a"><div class="kpi-n">${pastores.length}</div><div class="kpi-l">Pastores</div></div>
      <div class="kpi kpi-b"><div class="kpi-n">${ZONES.length}</div><div class="kpi-l">Zonas</div></div>
      <div class="kpi kpi-r"><div class="kpi-n">${totalPend}</div><div class="kpi-l">Pendientes</div></div>
      <div class="kpi kpi-g"><div class="kpi-n">${withRP.length}</div><div class="kpi-l">Con reporte</div></div>
    </div>`;

  if(upcoming.length){
    h+=`<div class="dsect">PRÓXIMOS CUMPLEAÑOS</div><div class="bday-list">`;
    upcoming.slice(0,5).forEach(({p,days})=>{
      const photo=pastorPhotos[p.nombre];const col=pcol(p);
      const av=photo?`<div class="bday-av"><img src="${photo}" loading="lazy"></div>`:`<div class="bday-av" style="background:${col}">${(p.nombre[0]+(p.apellido||'')[0]||'').toUpperCase()}</div>`;
      const badge=days===0?'HOY 🎉':days===1?'MAÑANA':`${days} días`;
      h+=`<div class="bday-row">${av}<div class="bday-name">${p.nombre} ${p.apellido||''}</div><div class="bday-date">${p.cumple}</div><div class="bday-badge">${badge}</div></div>`;
    });
    h+=`</div>`;
  }

  if(alerts.length){
    h+=`<div class="dsect">ALERTAS PASTORALES</div><div class="alert-list">`;
    alerts.slice(0,6).forEach(a=>{
      h+=`<div class="alert-row ${a.type}"><div class="alert-ico">${a.ico}</div><div><div class="alert-ttl">${a.title}</div>${a.desc?`<div class="alert-desc">${a.desc.substring(0,120)}</div>`:''}</div></div>`;
    });
    h+=`</div>`;
  }

  if(withRP.length){
    h+=`<div class="dsect">REPORTES RECIENTES</div><div class="bday-list">`;
    withRP.slice(0,5).forEach(p=>{
      const m=p.reporte_personal.metricas;
      const vals=Object.values(m);
      const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
      const photo=pastorPhotos[p.nombre];const col=pcol(p);
      const av=photo?`<div class="bday-av"><img src="${photo}" loading="lazy"></div>`:`<div class="bday-av" style="background:${col}">${(p.nombre[0]+(p.apellido||'')[0]||'').toUpperCase()}</div>`;
      const ac=avg>=9?'#22A05A':avg>=7?'#E8A820':'#D63939';
      h+=`<div class="bday-row" style="cursor:pointer" onclick="goTo('pastores',document.querySelector('[data-view=pastores]'));setTimeout(()=>openPanel(${pastores.indexOf(p)}),200)">
        ${av}<div class="bday-name">${p.nombre} ${p.apellido||''}</div>
        <div class="bday-date">${p.reporte_personal.fecha||''}</div>
        <div class="bday-badge" style="color:${ac};background:${ac}22">${avg}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  h+=`</div>`;
  document.getElementById('view-dashboard').innerHTML=h;
}

/* ── SEGUIMIENTO ── */
let sFilter='todos';
const taskStates={};
function renderSeguimiento(){
  const allTasks=[];
  pastores.forEach(p=>{
    (p.pendientes||[]).forEach((t,i)=>{
      const id=p.nombre+'_'+i;
      allTasks.push({id,text:t,pastor:(p.nombre+' '+(p.apellido||'')).trim(),zona:p.zona,isHealth:/salud|cirugía|médic|foniatra/i.test(t),state:taskStates[id]||'pend'});
    });
  });
  const filtered=sFilter==='todos'?allTasks:sFilter==='salud'?allTasks.filter(t=>t.isHealth):allTasks.filter(t=>t.zona===sFilter);
  const cnt={pend:0,prog:0,done:0};
  allTasks.forEach(t=>cnt[t.state]=(cnt[t.state]||0)+1);

  let h=`<div style="padding:20px 16px 80px">
    <div class="view-title">SEGUIMIENTO</div>
    <div class="seg-kpis">
      <div class="sk"><div class="sk-n" style="color:var(--amber)">${cnt.pend||0}</div><div class="sk-l">PENDIENTE</div></div>
      <div class="sk"><div class="sk-n" style="color:var(--blue)">${cnt.prog||0}</div><div class="sk-l">EN PROCESO</div></div>
      <div class="sk"><div class="sk-n" style="color:var(--green)">${cnt.done||0}</div><div class="sk-l">LISTO</div></div>
    </div>
    <div class="filters" style="overflow-x:auto;scrollbar-width:none;padding-bottom:2px">
      ${['todos','salud','qro','norte','sur','centro','otro'].map(f=>`<button class="f-btn${sFilter===f?' active':''}" onclick="sFilter='${f}';renderSeguimiento()">${f==='salud'?'⚕ SALUD':f.toUpperCase()}</button>`).join('')}
    </div>
    <div class="task-list">`;

  if(!filtered.length){
    h+=`<div class="empty-state"><div class="empty-icon">✓</div><div class="empty-text">TODO AL DÍA</div></div>`;
  } else {
    filtered.forEach(t=>{
      const cls=t.state==='done'?'tdone':t.state==='prog'?'tprog':'';
      const slbl=t.state==='done'?'LISTO':t.state==='prog'?'EN PROCESO':'PENDIENTE';
      const scls=t.state==='done'?'sd':t.state==='prog'?'si':'sp';
      h+=`<div class="task ${cls}" onclick="cycleTask('${t.id}')">
        <div class="tcheck">${t.state==='done'?'✓':''}</div>
        <div class="tbody">
          <div class="ttitle">${t.text}</div>
          <div class="tmeta">
            <span class="tpastor">${t.pastor}</span>
            <span class="tzone" style="background:${ZTEXTBG[t.zona]||'#222'};color:${ZCOLORS[t.zona]||'#888'}">${t.zona.toUpperCase()}</span>
            ${t.isHealth?'<span style="font-family:var(--mono);font-size:9px;color:var(--red)">⚕</span>':''}
          </div>
        </div>
        <div class="tstatus ${scls}">${slbl}</div>
      </div>`;
    });
  }
  h+=`</div></div>`;
  document.getElementById('view-seguimiento').innerHTML=h;
  document.getElementById('nb-seg').textContent=cnt.pend||0;
}
function cycleTask(id){taskStates[id]=({pend:'prog',prog:'done',done:'pend'})[taskStates[id]||'pend'];renderSeguimiento();}

/* ── EDIT FORM ── */
let editIdx=-1;
function openEF(idx){
  editIdx=idx;
  const p=idx===-1?{nombre:'',apellido:'',iglesia:'',ciudad:'',zona:'qro',esposa:'',cumple:'',avatar:'',hijos:[],notas:'',reunion:'',pendientes:[],tags:[]}:JSON.parse(JSON.stringify(pastores[idx]));
  const zO=ZONES.map(z=>`<option value="${z.id}"${p.zona===z.id?' selected':''}>${z.label}</option>`).join('');
  const hH=(p.hijos||[]).map((c,i)=>`<div class="ef-row-item"><input placeholder="Nombre" value="${c.nombre||''}" oninput="eH(${i},'nombre',this.value)"><input placeholder="Edad" value="${c.edad||''}" style="max-width:50px" oninput="eH(${i},'edad',this.value)"><button class="ef-del" onclick="rH(${i})">−</button></div>`).join('');
  const pH=(p.pendientes||[]).map((x,i)=>`<div class="ef-pend-item"><textarea class="ef-pend-ta" rows="2" oninput="eP(${i},this.value)">${x}</textarea><button class="ef-del" onclick="rP(${i})">−</button></div>`).join('');
  document.getElementById('ef-panel').innerHTML=`
    <div class="ef-nav"><button class="ef-cancel" onclick="closeEF()">CANCELAR</button><div class="ef-nav-title">${idx===-1?'NUEVO':'EDITAR'}</div><button class="ef-done" onclick="saveForm()">LISTO</button></div>
    <div class="ef-body">
      <div class="ef-group"><div class="ef-gtitle">Información</div>
        <div class="ef-fields">
          <div class="ef-field"><span class="ef-lbl">Nombre</span><input class="ef-inp" value="${p.nombre}" oninput="eT('nombre',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Apellido</span><input class="ef-inp" value="${p.apellido||''}" oninput="eT('apellido',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Iglesia</span><input class="ef-inp" value="${p.iglesia||''}" oninput="eT('iglesia',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Ciudad</span><input class="ef-inp" value="${p.ciudad||''}" oninput="eT('ciudad',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Zona</span><select class="ef-sel" onchange="eT('zona',this.value)">${zO}</select></div>
          <div class="ef-field"><span class="ef-lbl">Esposa</span><input class="ef-inp" value="${p.esposa||''}" oninput="eT('esposa',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Cumpleaños</span><input class="ef-inp" value="${p.cumple||''}" oninput="eT('cumple',this.value)"></div>
        </div>
      </div>
      <div class="ef-group"><div class="ef-gtitle">Hijos</div>
        <div class="ef-fields" id="hijos-list">${hH||'<div style="padding:9px 12px;color:var(--ink3);font-family:var(--mono);font-size:10px">Sin hijos</div>'}</div>
        <button class="ef-add-btn" onclick="addH()">+ AGREGAR HIJO</button>
      </div>
      <div class="ef-group"><div class="ef-gtitle">Notas</div><textarea class="ef-ta" oninput="eT('notas',this.value)">${p.notas||''}</textarea></div>
      <div class="ef-group"><div class="ef-gtitle">Última reunión</div><textarea class="ef-ta" oninput="eT('reunion',this.value)">${p.reunion||''}</textarea></div>
      <div class="ef-group"><div class="ef-gtitle">Pendientes</div>
        <div class="ef-fields" id="pend-list">${pH||'<div style="padding:9px 12px;color:var(--ink3);font-family:var(--mono);font-size:10px">Sin pendientes</div>'}</div>
        <button class="ef-add-btn" onclick="addP()">+ AGREGAR PENDIENTE</button>
      </div>
      <button class="ef-submit ef-save" onclick="saveForm()">GUARDAR</button>
      ${idx!==-1?`<button class="ef-submit ef-delete" onclick="delP(${idx})">ELIMINAR PASTOR</button>`:''}
    </div>`;
  window._et=p;
  document.getElementById('ef-bg').classList.add('open');
}
function eT(f,v){if(window._et)window._et[f]=v;}
function eH(i,f,v){if(window._et&&window._et.hijos)window._et.hijos[i][f]=v;}
function rH(i){if(window._et){window._et.hijos.splice(i,1);openEF(editIdx);}}
function addH(){if(window._et){if(!window._et.hijos)window._et.hijos=[];window._et.hijos.push({nombre:'',edad:'',datos:''});openEF(editIdx);}}
function eP(i,v){if(window._et&&window._et.pendientes)window._et.pendientes[i]=v;}
function rP(i){if(window._et){window._et.pendientes.splice(i,1);openEF(editIdx);}}
function addP(){if(window._et){if(!window._et.pendientes)window._et.pendientes=[];window._et.pendientes.push('');openEF(editIdx);}}
function saveForm(){
  const p=window._et;if(!p||!p.nombre)return alert('Nombre requerido');
  if(!p.avatar)p.avatar=(p.nombre[0]+((p.apellido||'')[0]||'')).toUpperCase();
  if(!p.tags)p.tags=[];
  p.pendientes=(p.pendientes||[]).filter(x=>x.trim());
  p.hijos=(p.hijos||[]).filter(h=>h.nombre);
  if(editIdx===-1)pastores.push(p);else pastores[editIdx]=p;
  saveAll();closeEF();renderPastores();
}
function delP(i){if(!confirm('¿Eliminar a '+pastores[i].nombre+'?'))return;pastores.splice(i,1);saveAll();closeEF();renderPastores();}
function closeEF(){document.getElementById('ef-bg').classList.remove('open');window._et=null;editIdx=-1;}

/* ── INIT ── */
renderPastores();
updateBadges();
</script>
</body>
</html>
