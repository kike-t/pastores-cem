<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pastores CEM</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  const cfg={apiKey:"AIzaSyACo7a3uVsGwAdii3d8W3NmXvLVBdgTF1A",authDomain:"pastores-cem.firebaseapp.com",projectId:"pastores-cem",storageBucket:"pastores-cem.firebasestorage.app",messagingSenderId:"45247752354",appId:"1:45247752354:web:eb41da403d38c72d788ffb"};
  const app=initializeApp(cfg); const db=getFirestore(app);
  window.db=db;window.fsDoc=doc;window.fsSetDoc=setDoc;window.fsCollection=collection;window.fsGetDocs=getDocs;
  async function load(){try{const snap=await getDocs(collection(db,"pastores"));if(!snap.empty){const d=[];snap.forEach(x=>d.push(x.data()));d.sort((a,b)=>a.nombre.localeCompare(b.nombre));pastores.length=0;d.forEach(p=>pastores.push(p));render();}else{await saveCloud();}}catch(e){console.warn(e);}}
  async function saveCloud(){for(const p of pastores){const id=(p.nombre+'_'+(p.apellido||'')).replace(/\s+/g,'_').toLowerCase();try{await setDoc(doc(db,"pastores",id),p);}catch(e){}}}
  window.saveCloud=saveCloud;
  window.addEventListener('load',()=>setTimeout(load,300));
</script>

<style>
:root {
  --bg: #FAFAFA;
  --white: #FFFFFF;
  --ink: #0F0F0F;
  --ink2: #5C5C5C;
  --ink3: #ADADAD;
  --line: #EBEBEB;
  --accent: #1A1A2E;
  --accent2: #16213E;
  --gold: #E8A020;
  --gold-light: #FFF4DE;
  --green: #0F9D6A;
  --green-light: #E6F7F1;
  --red: #E03E3E;
  --red-light: #FEF0F0;
  --blue: #1A6BFF;
  --blue-light: #EEF3FF;
  --r: 20px;
  --r-sm: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;}

/* ── TOP BAR ── */
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--line);
  padding: calc(env(safe-area-inset-top,0px) + 16px) 20px 0;
  position: sticky; top:0; z-index:100;
}
.topbar-row {
  display:flex; align-items:center; gap:12px;
  padding-bottom:14px;
}
.app-icon {
  width:40px;height:40px;border-radius:12px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.app-icon span { font-size:18px; }
.topbar-titles { flex:1; }
.topbar-title {
  font-size:20px;font-weight:800;color:var(--ink);
  letter-spacing:-0.4px;line-height:1.1;
}
.topbar-sub { font-size:12px;color:var(--ink3);font-weight:500;margin-top:1px; }
.topbar-count {
  font-size:13px;font-weight:600;
  background:var(--accent);color:white;
  padding:4px 10px;border-radius:99px;
  flex-shrink:0;
}

/* Search */
.search-row {
  display:flex;gap:10px;padding-bottom:12px;
}
.search-box {
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1.5px solid var(--line);
  border-radius:var(--r-sm);padding:9px 14px;
  transition:border-color 0.2s;
}
.search-box:focus-within{border-color:var(--accent);}
.search-box svg{width:16px;height:16px;color:var(--ink3);flex-shrink:0;}
.search-inp{border:none;background:none;outline:none;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);flex:1;font-weight:500;}
.search-inp::placeholder{color:var(--ink3);}

/* Zone tabs */
.tabs {
  display:flex;gap:0;overflow-x:auto;scrollbar-width:none;
  border-top:1px solid var(--line);
  margin:0 -20px;padding:0 20px;
}
.tabs::-webkit-scrollbar{display:none;}
.tab {
  padding:10px 16px;font-size:13px;font-weight:600;
  font-family:'Plus Jakarta Sans',sans-serif;
  border:none;background:none;color:var(--ink3);
  cursor:pointer;white-space:nowrap;
  border-bottom:2.5px solid transparent;
  transition:all 0.15s;margin-bottom:-1px;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── CONTENT ── */
.content { padding:20px 16px 140px; }

.zone-section { margin-bottom:28px; }
.zone-label {
  font-size:11px;font-weight:700;color:var(--ink3);
  text-transform:uppercase;letter-spacing:0.12em;
  padding:0 4px;margin-bottom:10px;
}

/* ── CARD ── */
.card {
  background:var(--white);
  border:1.5px solid var(--line);
  border-radius:var(--r);
  padding:14px 16px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;
  transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:var(--shadow);
  margin-bottom:8px;
  position:relative;
  overflow:hidden;
}
.card::before {
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:transparent;
  transition:background 0.2s;
}
.card:hover{transform:translateY(-2px) scale(1.005);box-shadow:var(--shadow-lg);border-color:var(--accent);}
.card:hover::before{background:var(--accent);}
.card:active{transform:scale(0.99);opacity:0.8;}

/* Avatar */
.av {
  width:48px;height:48px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:800;flex-shrink:0;
  overflow:hidden;
  transition:transform 0.2s;
}
.card:hover .av{transform:scale(1.05);}
.av img{width:100%;height:100%;object-fit:cover;}
.av-0{background:linear-gradient(135deg,#667EEA,#764BA2);}
.av-1{background:linear-gradient(135deg,#F093FB,#F5576C);}
.av-2{background:linear-gradient(135deg,#4FACFE,#00F2FE);}
.av-3{background:linear-gradient(135deg,#43E97B,#38F9D7);}
.av-4{background:linear-gradient(135deg,#FA709A,#FEE140);}
.av-5{background:linear-gradient(135deg,#A18CD1,#FBC2EB);}
.av-6{background:linear-gradient(135deg,#FD746C,#FF9068);}
.av-7{background:linear-gradient(135deg,#30CFD0,#330867);}
.av-8{background:linear-gradient(135deg,#A1C4FD,#C2E9FB);}
.av-9{background:linear-gradient(135deg,#FFF1EB,#ACE0F9);}

.card-body{flex:1;min-width:0;}
.card-name{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-church{font-size:13px;color:var(--ink2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.card-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.chip{font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;line-height:1.2;}
.chip-orange{background:var(--gold-light);color:var(--gold);}
.chip-red{background:var(--red-light);color:var(--red);}
.chip-green{background:var(--green-light);color:var(--green);}
.chip-blue{background:var(--blue-light);color:var(--blue);}
.chip-gray{background:#F0F0F0;color:var(--ink2);}

.card-arrow{
  width:30px;height:30px;border-radius:10px;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all 0.2s;
}
.card:hover .card-arrow{background:var(--accent);color:white;}
.card-arrow svg{width:14px;height:14px;color:var(--ink3);transition:color 0.2s;}
.card:hover .card-arrow svg{color:white;}

/* ── PANEL (sheet) ── */
.panel-bg{
  display:none;position:fixed;inset:0;
  background:rgba(15,15,15,0.4);
  z-index:200;backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  align-items:flex-end;justify-content:center;
}
.panel-bg.open{display:flex;}
@media(min-width:640px){.panel-bg.open{align-items:center;padding:20px;}.panel{border-radius:var(--r)!important;max-height:88vh!important;}}
.panel{
  background:var(--white);
  width:100%;max-width:600px;max-height:93vh;
  border-radius:var(--r) var(--r) 0 0;
  overflow-y:auto;scrollbar-width:none;
  animation:panelUp 0.35s cubic-bezier(0.34,1.1,0.64,1);
  box-shadow:0 -8px 60px rgba(0,0,0,0.15);
  padding-bottom:env(safe-area-inset-bottom,20px);
}
.panel::-webkit-scrollbar{display:none;}
@keyframes panelUp{from{transform:translateY(50px);opacity:0;}to{transform:translateY(0);opacity:1;}}

.panel-drag{width:40px;height:4px;background:var(--line);border-radius:99px;margin:14px auto 0;}

/* Panel hero */
.panel-hero{
  padding:20px 20px 24px;
  display:flex;gap:16px;align-items:flex-start;
  border-bottom:1px solid var(--line);
}
.panel-av{
  width:68px;height:68px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:800;
  overflow:hidden;flex-shrink:0;
  box-shadow:0 6px 20px rgba(0,0,0,0.15);
}
.panel-av img{width:100%;height:100%;object-fit:cover;}
.panel-info{flex:1;}
.panel-name{font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-0.5px;line-height:1.1;}
.panel-church{font-size:14px;color:var(--ink2);margin-top:4px;font-weight:500;}
.panel-zone{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:var(--blue-light);color:var(--blue);}
.panel-close{
  width:32px;height:32px;border-radius:99px;
  background:var(--bg);border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  font-size:14px;color:var(--ink2);
  transition:all 0.15s;
}
.panel-close:hover{background:var(--ink);color:white;border-color:var(--ink);}

/* Action row */
.action-row{
  display:flex;gap:8px;padding:16px 20px;
  border-bottom:1px solid var(--line);
  overflow-x:auto;scrollbar-width:none;
}
.action-row::-webkit-scrollbar{display:none;}
.action-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  flex-shrink:0;cursor:pointer;
}
.action-ico{
  width:52px;height:52px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  transition:transform 0.15s;
}
.action-btn:active .action-ico{transform:scale(0.9);}
.action-lbl{font-size:11px;font-weight:600;color:var(--ink2);}
.aico-call{background:var(--green-light);}
.aico-mail{background:var(--blue-light);}
.aico-web{background:#FFF4DE;}
.aico-map{background:var(--red-light);}
.aico-fb{background:#EEF3FF;}
.aico-ig{background:#FDF0FF;}

/* Panel sections */
.ps{padding:20px 20px 0;}
.ps-title{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
.ps-card{background:var(--bg);border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--line);margin-bottom:20px;}
.ps-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);}
.ps-row:last-child{border-bottom:none;}
.ps-ico{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.ps-info{flex:1;min-width:0;}
.ps-key{font-size:13px;font-weight:600;color:var(--ink);}
.ps-val{font-size:12px;color:var(--ink2);margin-top:1px;line-height:1.4;}
.ps-val a{color:var(--blue);text-decoration:none;font-weight:600;}
.ps-right{font-size:13px;color:var(--ink2);font-weight:500;}
.ps-arrow{color:var(--ink3);font-size:11px;font-weight:700;margin-left:4px;}

.ps-text{
  background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:14px;font-size:14px;line-height:1.7;color:var(--ink2);
  margin-bottom:20px;font-weight:500;
}

/* Hijos */
.hijo-card{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;margin-bottom:20px;}
.hijo-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);}
.hijo-row:last-child{border-bottom:none;}
.hijo-av{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#667EEA,#764BA2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0;}
.hijo-name{font-size:14px;font-weight:700;color:var(--ink);flex:1;}
.hijo-age{font-size:12px;font-weight:600;padding:2px 8px;background:var(--blue-light);color:var(--blue);border-radius:99px;}
.hijo-detail{font-size:12px;color:var(--ink2);margin-top:2px;}

/* Pendientes */
.pend-list{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;margin-bottom:20px;}
.pend-item{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border-bottom:1px solid var(--line);}
.pend-item:last-child{border-bottom:none;}
.pend-n{min-width:24px;height:24px;background:var(--gold-light);border-radius:8px;font-size:11px;font-weight:800;color:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.pend-t{font-size:14px;color:var(--ink);line-height:1.55;font-weight:500;}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.stat-box{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;}
.stat-num{font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-0.5px;}
.stat-lbl{font-size:12px;color:var(--ink2);margin-top:3px;line-height:1.3;font-weight:500;}

/* Event rows */
.event-list{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;margin-bottom:20px;}
.event-row{display:flex;gap:10px;align-items:flex-start;padding:10px 14px;border-bottom:1px solid var(--line);}
.event-row:last-child{border-bottom:none;}
.event-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px;}
.event-body{flex:1;}
.event-name{font-size:13px;font-weight:700;color:var(--ink);}
.event-meta{font-size:11px;color:var(--ink3);font-weight:600;margin-top:2px;}
.event-desc{font-size:12px;color:var(--ink2);margin-top:2px;line-height:1.4;}

/* ── BOTTOM BAR ── */
.bottombar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
  padding:10px 16px calc(10px + env(safe-area-inset-bottom,0px));
  display:flex;align-items:center;gap:10px;z-index:100;
}
.bb-msg{font-size:13px;color:var(--ink2);flex:1;font-weight:500;}
.bb-btn{
  padding:10px 20px;border-radius:99px;border:none;
  font-size:14px;font-weight:700;
  font-family:'Plus Jakarta Sans',sans-serif;
  cursor:pointer;
  transition:all 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
.bb-btn:active{transform:scale(0.95);}
.bb-edit{background:var(--accent);color:white;margin-left:auto;}
.bb-edit:hover{background:var(--accent2);}
.bb-exit{background:var(--red-light);color:var(--red);}
.bb-add{background:var(--green-light);color:var(--green);}
.bb-save{background:var(--green);color:white;}

/* ── EDIT FORM ── */
.ef-bg{display:none;position:fixed;inset:0;background:rgba(15,15,15,0.5);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.ef-bg.open{display:flex;}
@media(min-width:640px){.ef-bg.open{align-items:center;padding:20px;}.ef-panel{border-radius:var(--r)!important;}}
.ef-panel{
  background:var(--white);width:100%;max-width:560px;max-height:93vh;
  border-radius:var(--r) var(--r) 0 0;overflow-y:auto;scrollbar-width:none;
  animation:panelUp 0.3s cubic-bezier(0.34,1.1,0.64,1);
  box-shadow:0 -8px 60px rgba(0,0,0,0.15);
  padding-bottom:env(safe-area-inset-bottom,20px);
}
.ef-panel::-webkit-scrollbar{display:none;}
.ef-nav{
  display:flex;align-items:center;padding:16px 20px;
  border-bottom:1px solid var(--line);
}
.ef-nav-title{font-size:16px;font-weight:800;color:var(--ink);flex:1;text-align:center;letter-spacing:-0.2px;}
.ef-cancel{font-size:14px;font-weight:600;background:none;border:none;color:var(--red);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.ef-done{font-size:14px;font-weight:800;background:none;border:none;color:var(--blue);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.ef-body{padding:20px;}
.ef-group{margin-bottom:20px;}
.ef-group-title{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
.ef-fields{background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r-sm);overflow:hidden;}
.ef-field{display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--line);min-height:46px;}
.ef-field:last-child{border-bottom:none;}
.ef-lbl{font-size:14px;font-weight:600;color:var(--ink);min-width:90px;flex-shrink:0;}
.ef-inp,.ef-sel{flex:1;background:none;border:none;outline:none;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink2);text-align:right;padding:12px 0;font-weight:500;}
.ef-sel option{background:white;}
.ef-ta{width:100%;background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r-sm);padding:12px 14px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);outline:none;min-height:80px;resize:vertical;line-height:1.6;font-weight:500;}
.ef-ta:focus{border-color:var(--accent);}
.ef-row-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line);}
.ef-row-item:last-child{border-bottom:none;}
.ef-row-item input{flex:1;background:none;border:none;outline:none;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);font-weight:500;}
.ef-row-item input::placeholder{color:var(--ink3);}
.ef-del{background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;}
.ef-add-btn{
  display:flex;align-items:center;gap:6px;
  width:100%;padding:12px 14px;
  background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r-sm);
  font-size:14px;font-weight:700;color:var(--blue);
  cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;
  margin-top:6px;transition:all 0.15s;
}
.ef-add-btn:hover{background:var(--blue-light);border-color:var(--blue);}
.ef-pend-item{display:flex;align-items:flex-start;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line);}
.ef-pend-item:last-child{border-bottom:none;}
.ef-pend-ta{flex:1;background:none;border:none;outline:none;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);resize:none;min-height:38px;line-height:1.5;padding:4px 0;font-weight:500;}
.ef-pend-ta::placeholder{color:var(--ink3);}
.ef-submit{width:100%;padding:14px;border-radius:var(--r-sm);border:none;font-size:15px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;margin-top:8px;transition:all 0.15s;}
.ef-submit:active{transform:scale(0.98);}
.ef-submit-save{background:var(--accent);color:white;}
.ef-submit-delete{background:var(--red-light);color:var(--red);border:1.5px solid rgba(224,62,62,0.2);}

.empty{text-align:center;padding:80px 20px;color:var(--ink3);font-size:15px;font-weight:600;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row">
    <div class="app-icon"><span>✦</span></div>
    <div class="topbar-titles">
      <div class="topbar-title">Pastores CEM</div>
      <div class="topbar-sub">Compañerismo · Kike</div>
    </div>
    <div class="topbar-count" id="top-count">—</div>
  </div>

const grads=['av-0','av-1','av-2','av-3','av-4','av-5','av-6','av-7','av-8','av-9'];
function avC(p){const map={'av-teal':'av-2','av-blue':'av-8','av-purple':'av-0','av-amber':'av-6','av-coral':'av-1','av-gold':'av-4','av-green':'av-3','av-rose':'av-1'};if(map[p.color])return map[p.color];const h=[...(p.nombre||'')].reduce((a,c)=>a+c.charCodeAt(0),0);return grads[h%grads.length];}
function zL(z){return{centro:'Centro',norte:'Norte',sur:'Sur',otro:'Internacional'}[z]||z;}
function zC(z){return{centro:'chip chip-blue',norte:'chip chip-green',sur:'chip chip-orange',otro:'chip chip-gray'}[z]||'chip chip-gray';}

function setZ(btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeZ=btn.dataset.z;render();}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=pastores.filter(p=>{const mz=activeZ==='todos'||p.zona===activeZ;const hay=[p.nombre,p.apellido||'',p.iglesia||'',p.ciudad||'',p.esposa||''].join(' ').toLowerCase();return mz&&(!q||hay.includes(q));});
  document.getElementById('top-count').textContent=filtered.length;
  const zones=activeZ==='todos'?['centro','norte','sur','otro']:[activeZ];
  let html='';
  zones.forEach(z=>{
    const zp=filtered.filter(p=>p.zona===z);
    if(!zp.length)return;
    html+=`<div class="zone-section">`;
    if(activeZ==='todos')html+=`<div class="zone-label">${zL(z)}</div>`;
    zp.forEach(p=>{
      const idx=pastores.indexOf(p);
      const photo=pastorPhotos[p.nombre];
      const full=(p.nombre+' '+(p.apellido||'')).trim();
      const sub=[p.iglesia,p.ciudad].filter(Boolean).join(' · ');
      const hasPend=p.pendientes&&p.pendientes.length;
      const hasHealth=hasPend&&p.pendientes.some(x=>/salud|cirugía|médic/i.test(x));
      const avHtml=photo?`<div class="av"><img src="${photo}" alt="${full}"></div>`:`<div class="av ${avC(p)}">${(p.avatar||(p.nombre[0]+(p.apellido||'')[0]||'')).toUpperCase()}</div>`;
      html+=`<div class="card" onclick="editMode?openEF(${idx}):openPanel(${idx})">
        ${avHtml}
        <div class="card-body">
          <div class="card-name">${full}</div>
          <div class="card-church">${sub||'—'}</div>
          <div class="card-badges">
            <span class="${zC(p.zona)}">${zL(p.zona)}</span>
            ${p.esposa?`<span class="chip chip-gray">♡ ${p.esposa}</span>`:''}
            ${p.hijos&&p.hijos.length?`<span class="chip chip-gray">${p.hijos.length} hijo${p.hijos.length>1?'s':''}</span>`:''}
            ${hasHealth?'<span class="chip chip-red">⚕ salud</span>':hasPend?`<span class="chip chip-orange">${p.pendientes.length} pendiente${p.pendientes.length>1?'s':''}</span>`:''}
          </div>
        </div>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  if(!html)html='<div class="empty">Sin resultados</div>';
  document.getElementById('content').innerHTML=html;
}

function openPanel(idx){
  const p=pastores[idx];
  const d=directorio[p.nombre]||directorio[(p.nombre||'').split(' ')[0]]||{};
  const photo=pastorPhotos[p.nombre];
  const full=(p.nombre+' '+(p.apellido||'')).trim();
  const sub=[p.iglesia,p.ciudad].filter(Boolean).join(' · ');
  const avHtml=photo?`<div class="panel-av"><img src="${photo}"></div>`:`<div class="panel-av ${avC(p)}">${(p.avatar||(p.nombre[0]+(p.apellido||'')[0]||'')).toUpperCase()}</div>`;

  let h=`<div class="panel-drag"></div>
  <div class="panel-hero">

      <div class="${zC(p.zona)}" style="margin-top:6px;display:inline-block;">${zL(p.zona)}</div>
    </div>
    <button class="panel-close" onclick="document.getElementById('panel-bg').classList.remove('open')">✕</button>

  const actions=[];

  if(d.email)actions.push(`<div class="action-btn" onclick="window.location='mailto:${d.email}'"><div class="action-ico aico-mail">✉️</div><div class="action-lbl">Email</div></div>`);
  if(d.web)actions.push(`<div class="action-btn" onclick="window.open('${d.web}','_blank')"><div class="action-ico aico-web">🌐</div><div class="action-lbl">Web</div></div>`);
  if(d.facebook)actions.push(`<div class="action-btn" onclick="window.open('${d.facebook}','_blank')"><div class="action-ico aico-fb">📘</div><div class="action-lbl">Facebook</div></div>`);
  if(d.instagram&&d.instagram.startsWith('http'))actions.push(`<div class="action-btn" onclick="window.open('${d.instagram}','_blank')"><div class="action-ico aico-ig">📷</div><div class="action-lbl">Instagram</div></div>`);
  if(actions.length)h+=`<div class="action-row">${actions.join('')}</div>`;

  // Servicios
  if(d.horarios){h+=`<div class="ps"><div class="ps-title">Servicios</div><div class="ps-card"><div class="ps-row"><div class="ps-ico">🕐</div><div class="ps-info"><div class="ps-key">Horarios</div><div class="ps-val">${d.horarios}</div></div></div></div></div>`;}

  // Personal
  if(p.esposa||p.cumple){h+=`<div class="ps"><div class="ps-title">Personal</div><div class="ps-card">`;if(p.esposa)h+=`<div class="ps-row"><div class="ps-ico">💝</div><div class="ps-info"><div class="ps-key">Esposa</div></div><div class="ps-right">${p.esposa}</div></div>`;if(p.cumple)h+=`<div class="ps-row"><div class="ps-ico">🎂</div><div class="ps-info"><div class="ps-key">Cumpleaños</div></div><div class="ps-right">${p.cumple}</div></div>`;h+=`</div></div>`;}

  // Hijos
  if(p.hijos&&p.hijos.length){h+=`<div class="ps"><div class="ps-title">Hijos</div><div class="hijo-card">`;p.hijos.forEach((c,i)=>{const initials=(c.nombre||'?')[0].toUpperCase();h+=`<div class="hijo-row"><div class="hijo-av">${initials}</div><div style="flex:1"><div class="hijo-name">${c.nombre}</div>${c.datos?`<div class="hijo-detail">${c.datos}</div>`:''}</div>${c.edad?`<span class="hijo-age">${c.edad}a`+`</span>`:''}</div>`;});h+=`</div></div>`;}

  // Reunion
  if(p.reunion)h+=`<div class="ps"><div class="ps-title">Última reunión</div><div class="ps-text">${p.reunion}</div></div>`;
  if(p.notas)h+=`<div class="ps"><div class="ps-title">Notas</div><div class="ps-text">${p.notas}</div></div>`;

  // Iglesia stats
  if(p.iglesia_reporte){const ir=p.iglesia_reporte;h+=`<div class="ps"><div class="ps-title">Iglesia 2025</div>`;if(ir.stats){h+=`<div class="stats-grid">`;ir.stats.forEach(s=>h+=`<div class="stat-box"><div class="stat-num">${s.valor}</div><div class="stat-lbl">${s.label}</div></div>`);h+=`</div>`;}if(ir.logros)h+=`<div class="ps-text">${ir.logros}</div>`;if(ir.plan2026){h+=`<div class="ps-title" style="margin-top:-10px;">Plan 2026</div><div class="ps-text">${ir.plan2026}</div>`;}h+=`</div>`;}

  // Pendientes
  if(p.pendientes&&p.pendientes.length){h+=`<div class="ps"><div class="ps-title">Pendientes para Kike</div><div class="pend-list">`;p.pendientes.forEach((x,i)=>h+=`<div class="pend-item"><span class="pend-n">${i+1}</span><span class="pend-t">${x}</span></div>`);h+=`</div></div>`;}

  // Events
  const nm={'Horizonte Querétaro':'Horizonte Querétaro','Identidad San Luis':'Identidad San Luis','Horizonte El Marqués':'Horizonte El Marqués','másCristo':'másCristo','Horizonte Villahermosa':'Horizonte Villahermosa','Horizonte Mérida':'Horizonte Mérida','Horizonte CDMX':'Horizonte CDMX','Comunidad Baluarte':'Comunidad Baluarte','La Carpa CEM':'La Carpa CEM','Horizonte Panamá':'Horizonte Panamá','Gracia Irresistible Calvary':'Gracia Irresistible','Calvary Ecatepec':'Calvary Ecatepec','Calvary Chapel Texcoco':'Calvary Texcoco','Horizonte Tequisquiapan':'Horizonte Tequisquiapan','Vida Nueva en Cristo':'Vida Nueva en Cristo','La Carpa del Valle':'La Carpa del Valle','Fuentes de Agua Viva':'Fuentes de Agua Viva','Horizonte Hermosillo':'Horizonte Hermosillo'};
  const evts=(BY_SEDE[nm[p.iglesia||'']||p.iglesia]||[]).slice(0,5);
  if(evts.length){h+=`<div class="ps"><div class="ps-title">Eventos recientes</div><div class="event-list">`;evts.forEach(e=>h+=`<div class="event-row"><div class="event-dot"></div><div class="event-body"><div class="event-name">${e.evento}</div><div class="event-meta">${e.mes} ${e.year}</div>${e.descripcion?`<div class="event-desc">${e.descripcion.substring(0,90)}${e.descripcion.length>90?'…':''}</div>`:''}</div></div>`);h+=`</div></div>`;}

  h+=`<div style="height:8px;"></div>`;
  document.getElementById('panel').innerHTML=h;
  document.getElementById('panel-bg').classList.add('open');
}

function eT(f,v){if(window._et)window._et[f]=v;}
function eH(i,f,v){if(window._et&&window._et.hijos)window._et.hijos[i][f]=v;}
function rH(i){if(window._et){window._et.hijos.splice(i,1);openEF(editIdx);}}
function addH(){if(window._et){if(!window._et.hijos)window._et.hijos=[];window._et.hijos.push({nombre:'',edad:'',datos:''});openEF(editIdx);}}
function eP(i,v){if(window._et&&window._et.pendientes)window._et.pendientes[i]=v;}
function rP(i){if(window._et){window._et.pendientes.splice(i,1);openEF(editIdx);}}
function addP(){if(window._et){if(!window._et.pendientes)window._et.pendientes=[];window._et.pendientes.push('');openEF(editIdx);}}
function saveForm(){const p=window._et;if(!p||!p.nombre){alert('El nombre es obligatorio');return;}if(!p.avatar)p.avatar=(p.nombre[0]+((p.apellido||'')[0]||'')).toUpperCase();if(!p.tags)p.tags=[];p.pendientes=(p.pendientes||[]).filter(x=>x.trim());p.hijos=(p.hijos||[]).filter(h=>h.nombre);if(editIdx===-1)pastores.push(p);else pastores[editIdx]=p;saveAll();closeEF();render();}
function delP(i){if(!confirm('¿Eliminar a '+pastores[i].nombre+'?'))return;pastores.splice(i,1);saveAll();closeEF();render();}
