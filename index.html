/* ═══════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════ */
function renderDashboard(){
  const MONTHS={enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12,ene:1,feb:2,mar:3,abr:4,may:5,jun:6,jul:7,ago:8,sep:9,oct:10,nov:11,dic:12};
  const now = new Date();
  function parseBday(s){
    if(!s) return null;
    const pts = s.toLowerCase().split(/[\s,\/]+/).filter(Boolean);
    let d=null,m=null;
    pts.forEach(pt=>{const n=parseInt(pt);if(!isNaN(n)&&n<=31)d=n;const ml=MONTHS[pt];if(ml)m=ml;});
    return(d&&m)?{d,m}:null;
  }
  function daysUntil(m,d){
    const y=now.getFullYear(); let next=new Date(y,m-1,d);
    if(next<=now) next=new Date(y+1,m-1,d);
    return Math.round((next-now)/(1000*60*60*24));
  }

  const upcoming=[];
  pastores.forEach(p=>{const bd=parseBday(p.cumple);if(bd){const days=daysUntil(bd.m,bd.d);if(days<=45)upcoming.push({p,days});}});
  upcoming.sort((a,b)=>a.days-b.days);

  const alerts=[];
  pastores.filter(p=>(p.pendientes||[]).some(x=>/salud|cirugía/i.test(x))).forEach(p=>{
    const t=p.pendientes.find(x=>/salud|cirugía/i.test(x));
    alerts.push({cls:'ar',ico:'⚕',title:`${p.nombre} ${p.apellido||''} — Salud`,desc:t});
  });
  pastores.filter(p=>(p.pendientes||[]).length>=5).forEach(p=>
    alerts.push({cls:'',ico:'⏳',title:`${p.nombre} — ${p.pendientes.length} pendientes activos`,desc:p.pendientes[0]}));
  pastores.filter(p=>p.tags&&p.tags.includes('nuevo')).forEach(p=>
    alerts.push({cls:'ag',ico:'🌱',title:`${p.nombre} ${p.apellido||''} — Recién integrado`,desc:`${p.iglesia} · ${p.ciudad}`}));

  const totalPend = pastores.reduce((s,p)=>s+(p.pendientes||[]).length,0);
  const withRP    = pastores.filter(p=>p.reporte_personal);

  let h = `<div class="view-wrap">
    <div class="view-title">Dashboard</div>
    <div class="view-sub">${now.toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
    <div class="kpi-grid">
      <div class="kpi-card kpi-a"><div class="kpi-num">${pastores.length}</div><div class="kpi-lbl">Pastores</div></div>
      <div class="kpi-card kpi-b"><div class="kpi-num">${ZONES.length}</div><div class="kpi-lbl">Zonas</div></div>
      <div class="kpi-card kpi-r"><div class="kpi-num">${totalPend}</div><div class="kpi-lbl">Pendientes</div></div>
      <div class="kpi-card kpi-g"><div class="kpi-num">${withRP.length}</div><div class="kpi-lbl">Con reporte</div></div>
    </div>`;

  if(upcoming.length){
    h += `<div class="dash-sec">Próximos cumpleaños</div><div class="bday-list">`;
    upcoming.slice(0,5).forEach(({p,days})=>{
      const photo=pastorPhotos[p.nombre], col=pcol(p);
      const av=photo?`<div class="bday-av"><img src="${photo}" loading="lazy"></div>`:`<div class="bday-av" style="background:${col}">${(p.nombre[0]+(p.apellido||'')[0]||'').toUpperCase()}</div>`;
      const badge=days===0?'Hoy 🎉':days===1?'Mañana':`${days} días`;
      h+=`<div class="bday-row">${av}<div class="bday-name">${p.nombre} ${p.apellido||''}</div><div class="bday-date">${p.cumple}</div><div class="bday-badge">${badge}</div></div>`;
    });
    h += `</div>`;
  }

  if(alerts.length){
    h += `<div class="dash-sec">Alertas pastorales</div><div class="alert-list">`;
    alerts.slice(0,6).forEach(a=>{
      h+=`<div class="alert-row ${a.cls}"><div class="alert-ico">${a.ico}</div><div><div class="alert-ttl">${a.title}</div>${a.desc?`<div class="alert-desc">${String(a.desc).substring(0,120)}</div>`:''}</div></div>`;
    });
    h += `</div>`;
  }

  if(withRP.length){
    h += `<div class="dash-sec">Reportes recientes</div><div class="bday-list">`;
    withRP.slice(0,5).forEach(p=>{
      const m=p.reporte_personal.metricas, vals=Object.values(m);
      const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
      const photo=pastorPhotos[p.nombre], col=pcol(p);
      const av=photo?`<div class="bday-av"><img src="${photo}" loading="lazy"></div>`:`<div class="bday-av" style="background:${col}">${(p.nombre[0]+(p.apellido||'')[0]||'').toUpperCase()}</div>`;
      const ac=getEstado(parseFloat(avg)).color;
      h+=`<div class="bday-row" style="cursor:pointer" onclick="goTo('pastores',document.querySelector('[data-view=pastores]'));setTimeout(()=>openPanel(${pastores.indexOf(p)}),200)">
        ${av}
        <div class="bday-name">${p.nombre} ${p.apellido||''}</div>
        <div class="bday-date">${p.reporte_personal.fecha||''}</div>
        <div class="bday-badge" style="color:${ac};background:${ac}22">${avg}</div>
      </div>`;
    });
    h += `</div>`;
  }
  h += `</div>`;
  document.getElementById('view-dashboard').innerHTML = h;
}

          ${p.pendientes&&p.pendientes.length?`

/* ═══════════════════════════════════════════════════
   SEGUIMIENTO
═══════════════════════════════════════════════════ */
let sFilter = 'todos';
const taskStates = {};
function renderSeguimiento(){
  const allTasks = [];
  pastores.forEach(p=>{
    (p.pendientes||[]).forEach((t,i)=>{
      const id = p.nombre+'_'+i;
      allTasks.push({
        id, text:t,
        pastor:(p.nombre+' '+(p.apellido||'')).trim(),
        zona:p.zona,
        isHealth:/salud|cirugía|médic|foniatra/i.test(t),
        isApproved:/aprobad/i.test(t),
        state:taskStates[id]||'pend'
      });
    });
  });
  const filtered = sFilter==='todos'?allTasks:sFilter==='salud'?allTasks.filter(t=>t.isHealth):allTasks.filter(t=>t.zona===sFilter);
  const cnt = {pend:0,prog:0,done:0};
  allTasks.forEach(t=>cnt[t.state]=(cnt[t.state]||0)+1);

  let h = `<div class="view-wrap">
    <div class="view-title">Seguimiento</div>
    <div class="view-sub">Tareas y pendientes activos por pastor</div>
    <div class="seg-kpis">
      <div class="sk"><div class="sk-n" style="color:var(--qro)">${cnt.pend||0}</div><div class="sk-l">Pendiente</div></div>
      <div class="sk"><div class="sk-n" style="color:var(--norte)">${cnt.prog||0}</div><div class="sk-l">En proceso</div></div>
      <div class="sk"><div class="sk-n" style="color:var(--healthy)">${cnt.done||0}</div><div class="sk-l">Completado</div></div>
    </div>
    <div class="filters">
      ${['todos','salud','qro','norte','sur','centro','otro'].map(f=>`<button class="f-btn${sFilter===f?' active':''}" onclick="sFilter='${f}';renderSeguimiento()">${f==='salud'?'⚕ Salud':f==='todos'?'Todos':f.toUpperCase()}</button>`).join('')}
    </div>
    <div class="task-list">`;

  if(!filtered.length){
    h += `<div class="empty-state"><div class="empty-ico">✓</div><div class="empty-txt">Todo al día</div><div class="empty-sub">Sin pendientes en esta categoría</div></div>`;
  } else {
    filtered.forEach(t=>{
      const cls = t.state==='done'?'tdone':t.state==='prog'?'tprog':'';
      const slbl = t.state==='done'?'Listo':t.state==='prog'?'En proceso':'Pendiente';
      const scls = t.state==='done'?'sd':t.state==='prog'?'si':'sp';
      h+=`<div class="task ${cls}" onclick="cycleTask('${t.id}')">
        <div class="tcheck">${t.state==='done'?'✓':''}</div>
        <div style="flex:1;min-width:0">
          <div class="ttitle">${t.text}</div>
          <div class="tmeta">
            <span class="tpastor">${t.pastor}</span>
            <span class="tzone" style="background:${ZTEXTBG[t.zona]||'#222'};color:${ZCOLORS[t.zona]||'#888'}">${t.zona.toUpperCase()}</span>
            ${t.isHealth?'<span style="font-family: var(--sans);font-size:8.5px;color:var(--critical)">⚕ Salud</span>':''}
            ${t.isApproved?'<span style="font-family: var(--sans);font-size:8.5px;color:var(--healthy)">✓ Aprobado</span>':''}
          </div>
        </div>
        <div class="tstatus ${scls}">${slbl}</div>
      </div>`;
    });
  }
  h += `</div></div>`;
  document.getElementById('view-seguimiento').innerHTML = h;
  document.getElementById('nb-seg').textContent = cnt.pend||0;
}
function cycleTask(id){
  taskStates[id] = ({pend:'prog',prog:'done',done:'pend'})[taskStates[id]||'pend'];
  renderSeguimiento();
}

    </div>
    <div class="ef-body">
      <div class="ef-group"><div class="ef-gtitle">Información</div>
        <div class="ef-fields">
          <div class="ef-field"><span class="ef-lbl">Nombre</span><input class="ef-inp" value="${p.nombre}" oninput="eT('nombre',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Apellido</span><input class="ef-inp" value="${p.apellido||''}" oninput="eT('apellido',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Iglesia</span><input class="ef-inp" value="${p.iglesia||''}" oninput="eT('iglesia',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Ciudad</span><input class="ef-inp" value="${p.ciudad||''}" oninput="eT('ciudad',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Zona</span><select class="ef-sel" onchange="eT('zona',this.value)">${zO}</select></div>
          <div class="ef-field"><span class="ef-lbl">Esposa</span><input class="ef-inp" value="${p.esposa||''}" oninput="eT('esposa',this.value)"></div>
          <div class="ef-field"><span class="ef-lbl">Cumpleaños</span><input class="ef-inp" value="${p.cumple||''}" oninput="eT('cumple',this.value)"></div>
        </div>
      </div>
      <div class="ef-group"><div class="ef-gtitle">Hijos</div>
        <div class="ef-fields" id="hijos-list">${hH||'<div style="padding:10px 13px;color:var(--ink3);font-size:12px">Sin hijos registrados</div>'}</div>
        <button class="ef-add-btn" onclick="addH()">+ Agregar hijo</button>
      </div>
      <div class="ef-group"><div class="ef-gtitle">Notas pastorales</div>
        <textarea class="ef-ta" oninput="eT('notas',this.value)">${p.notas||''}</textarea></div>
      <div class="ef-group"><div class="ef-gtitle">Última reunión</div>
        <textarea class="ef-ta" oninput="eT('reunion',this.value)">${p.reunion||''}</textarea></div>
      <div class="ef-group"><div class="ef-gtitle">Pendientes y acuerdos</div>
        <div class="ef-fields" id="pend-list">${pH||'<div style="padding:10px 13px;color:var(--ink3);font-size:12px">Sin pendientes</div>'}</div>
        <button class="ef-add-btn" onclick="addP()">+ Agregar pendiente</button>
      </div>
      <button class="ef-submit ef-save" onclick="saveForm()">Guardar cambios</button>
      ${idx!==-1?`<button class="ef-submit ef-delete" onclick="delP(${idx})">Eliminar pastor</button>`:''}
    </div>`;
  window._et = p;
  document.getElementById('ef-bg').classList.add('open');
}
function eT(f,v){if(window._et)window._et[f]=v;}
function eH(i,f,v){if(window._et&&window._et.hijos)window._et.hijos[i][f]=v;}
function rH(i){if(window._et){window._et.hijos.splice(i,1);openEF(editIdx);}}
function addH(){if(window._et){if(!window._et.hijos)window._et.hijos=[];window._et.hijos.push({nombre:'',edad:'',datos:''});openEF(editIdx);}}
function eP(i,v){if(window._et&&window._et.pendientes)window._et.pendientes[i]=v;}
function rP(i){if(window._et){window._et.pendientes.splice(i,1);openEF(editIdx);}}
function addP(){if(window._et){if(!window._et.pendientes)window._et.pendientes=[];window._et.pendientes.push('');openEF(editIdx);}}
function saveForm(){
  const p=window._et; if(!p||!p.nombre) return alert('Nombre requerido');
  if(!p.avatar) p.avatar=(p.nombre[0]+((p.apellido||'')[0]||'')).toUpperCase();
  if(!p.tags) p.tags=[];
  p.pendientes=(p.pendientes||[]).filter(x=>x.trim());
  p.hijos=(p.hijos||[]).filter(h=>h.nombre);
  if(editIdx===-1) pastores.push(p); else pastores[editIdx]=p;
  saveAll(); closeEF(); renderPastores();
}
function delP(i){if(!confirm('¿Eliminar a '+pastores[i].nombre+'?'))return;pastores.splice(i,1);saveAll();closeEF();renderPastores();}
function closeEF(){document.getElementById('ef-bg').classList.remove('open');window._et=null;editIdx=-1;}

/* ═══════════════════════════════════════════════════
   FIREBASE SYNC
═══════════════════════════════════════════════════ */
async function saveCloud(){
  if(!window.fsSetDoc||!window.db) return;
  for(const p of pastores){
    const id=(p.nombre+'_'+(p.apellido||'')).replace(/\s+/g,'_').toLowerCase();
    try{ await window.fsSetDoc(window.fsDoc(window.db,"pastores",id),p); }catch(e){}
  }
}
window.saveCloud = saveCloud;

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
renderPastores();
updateBadges();
</script>
</body>
</html>
